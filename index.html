// ── Password Gate ─────────────────────────────────────────────────────────────
// EDIT PASSWORD — change this to your own secret password
const EDIT_PASSWORD = "chiefs2026";
// VIEWER PASSWORD — set to "" to allow anyone to view without a password
const VIEW_PASSWORD = "";

function AuthGate() {
  const [mode, setMode] = React.useState(() => {
    // Check if already authenticated this session
    const saved = sessionStorage.getItem("chiefs_auth");
    if (saved === "edit") return "edit";
    if (saved === "view" && !VIEW_PASSWORD) return "view";
    if (saved === "view" && VIEW_PASSWORD) return "view";
    return VIEW_PASSWORD ? "locked" : "view";
  });
  const [input, setInput] = React.useState("");
  const [error, setError] = React.useState("");
  const [target, setTarget] = React.useState("view"); // which mode user is trying to enter

  const C2 = { bg:"#0a0c14", card:"#161b2e", border:"#1e2640", accent:"#4f8ef7", text:"#e8eaf2", muted:"#6b7399", green:"#22d3a5", red:"#f75f5f", purple:"#9b7ef8" };

  const attempt = () => {
    if (target === "edit") {
      if (input === EDIT_PASSWORD) {
        sessionStorage.setItem("chiefs_auth", "edit");
        setMode("edit");
      } else {
        setError("Incorrect password. Try again.");
        setInput("");
      }
    } else {
      if (!VIEW_PASSWORD || input === VIEW_PASSWORD) {
        sessionStorage.setItem("chiefs_auth", "view");
        setMode("view");
      } else {
        setError("Incorrect password.");
        setInput("");
      }
    }
  };

  if (mode === "edit" || mode === "view") {
    return <App isReadOnly={mode === "view"} onRequestEdit={() => { setTarget("edit"); setMode("locked"); }} />;
  }

  // Locked — show login screen
  return (
    <div style={{minHeight:"100vh",background:C2.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Sans, system-ui, sans-serif",padding:16}}>
      <div style={{background:C2.card,border:`1px solid ${C2.border}`,borderRadius:20,padding:"36px 32px",width:"min(420px,96vw)",boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:52,height:52,borderRadius:14,background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 14px"}}>◈</div>
          <div style={{fontSize:20,fontWeight:800,color:C2.text,letterSpacing:"-.3px"}}>Chiefs Group · OKR Tracker</div>
          <div style={{fontSize:13,color:C2.muted,marginTop:4}}>
            {target === "edit" ? "Enter editor password to make changes" : "Enter password to access the system"}
          </div>
        </div>

        {VIEW_PASSWORD && target === "view" && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Access Password</div>
            <input
              type="password"
              value={input}
              onChange={e => { setInput(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && attempt()}
              placeholder="Enter password…"
              autoFocus
              style={{width:"100%",background:"#111420",border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
            />
          </div>
        )}

        {target === "edit" && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Editor Password</div>
            <input
              type="password"
              value={input}
              onChange={e => { setInput(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && attempt()}
              placeholder="Enter editor password…"
              autoFocus
              style={{width:"100%",background:"#111420",border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
            />
          </div>
        )}

        {error && <div style={{fontSize:12,color:C2.red,marginBottom:12,textAlign:"center"}}>{error}</div>}

        <button
          onClick={attempt}
          style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:15,marginBottom:12,boxShadow:`0 4px 16px ${C2.accent}44`}}>
          {target === "edit" ? "Unlock Editor" : VIEW_PASSWORD ? "Access System" : "Continue"}
        </button>

        {!VIEW_PASSWORD && target === "view" && (
          <button
            onClick={attempt}
            style={{display:"none"}}
          />
        )}

        <div style={{display:"flex",gap:8,marginTop:8}}>
          {target !== "view" && (
            <button onClick={() => { setTarget("view"); setInput(""); setError(""); }}
              style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${C2.border}`,background:"transparent",color:C2.muted,cursor:"pointer",fontSize:12}}>
              ← View Only
            </button>
          )}
          {target !== "edit" && (
            <button onClick={() => { setTarget("edit"); setInput(""); setError(""); }}
              style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${C2.border}`,background:"transparent",color:C2.muted,cursor:"pointer",fontSize:12}}>
              🔒 Editor Login
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── CSV Parser — bulletproof, handles all Excel/Sheets export quirks ───────────
function parseCSV(rawText) {
  // 1. Strip UTF-8 BOM
  let text = rawText.replace(/^\uFEFF/, "");

  // 2. Parse the entire CSV properly, respecting quoted multiline fields
  // This handles \r\n, \r, and \n inside and outside quotes
  const allRows = parseCSVRows(text);

  if (allRows.length < 2) return { rows:[], errors:["File has no data rows."] };

  const ALIAS = {
    "key result":"keyresult","key_result":"keyresult","kr":"keyresult","key results":"keyresult","keyresults":"keyresult",
    "weight (%)":"weight","kr weight":"weight","weight(%)":"weight","krweight":"weight","weight%":"weight",
    "actual achievement":"actual","achievement":"actual","actuals":"actual",
    "targets":"target","target value":"target",
    "chief group":"chiefgroup","chief":"chiefgroup","chiefgroup":"chiefgroup","group":"chiefgroup",
    "target date":"targetdate","date":"targetdate","due date":"targetdate",
    "initiative":"initiative","key metric":"keyresult",
  };

  // Find first non-empty row as header
  const headerRowIdx = allRows.findIndex(r => r.some(c => c.trim() !== ""));
  if (headerRowIdx === -1) return { rows:[], errors:["No header row found."] };

  const rawHdrs = allRows[headerRowIdx];
  const hdrs = rawHdrs.map(h => {
    const n = h.replace(/"/g,"").trim().toLowerCase();
    return ALIAS[n] !== undefined ? ALIAS[n] : n;
  });

  const NEED = ["department","keyresult","weight","target","actual"];
  const miss = NEED.filter(n => !hdrs.includes(n));
  if (miss.length) {
    return { rows:[], errors:[`Missing required columns: ${miss.join(", ")}.\nDetected headers: ${rawHdrs.join(" | ")}`] };
  }

  const rows = [], errors = [];
  const dataRows = allRows.slice(headerRowIdx + 1);

  dataRows.forEach((cols, i) => {
    // Skip fully empty rows
    if (cols.every(c => c.trim() === "")) return;

    const o = {};
    hdrs.forEach((h, idx) => {
      o[h] = (cols[idx] !== undefined ? cols[idx] : "").trim();
    });

    if (!o.department || !o.keyresult) {
      // Only report as error if at least one cell has data (not a blank separator row)
      if (cols.some(c => c.trim() !== "")) {
        errors.push(`Row ${i+2}: missing Department or Key Result — skipped`);
      }
      return;
    }

    const w = parseFloat(o.weight), t = parseFloat(o.target), a = parseFloat(o.actual);
    if (isNaN(w) || isNaN(t) || isNaN(a)) {
      errors.push(`Row ${i+2} [${o.keyresult.slice(0,25)}]: Weight/Target/Actual must be numbers (got: "${o.weight}"/"${o.target}"/"${o.actual}") — skipped`);
      return;
    }
    // Accept zero values (e.g. actual=0 at start of year, or target=0 for zero-incident goals)
    rows.push({
      department: o.department,
      keyResult:  o.keyresult,
      chiefGroup: o.chiefgroup || getChief(o.department),
      targetDate: o.targetdate || "",
      weight: w, target: t, actual: a,
    });
  });

  return { rows, errors };
}

// Full RFC 4180 compliant CSV parser — returns array of string arrays
// Handles: \r\n, \r, \n line endings; quoted fields; escaped "" quotes; 
// trailing whitespace on lines; missing final newline; Excel/Sheets exports
function parseCSVRows(text) {
  const rows = [];
  let cur = [];
  let field = "";
  let inQuote = false;
  // Normalize ONLY \r\n → \n and lone \r → \n, leave content intact
  let s = "";
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '\r') {
      s += '\n';
      if (text[i+1] === '\n') i++; // skip the \n in \r\n
    } else {
      s += text[i];
    }
  }

  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuote) {
      if (ch === '"') {
        // Check for escaped double quote ""
        if (i + 1 < s.length && s[i+1] === '"') {
          field += '"';
          i++;
        } else {
          inQuote = false;
          // Don't add closing quote to field — it was structural
        }
      } else {
        field += ch; // include newlines inside quotes as literal content
      }
    } else {
      if (ch === '"') {
        inQuote = true;
        // Handle space before opening quote (lenient parsing)
      } else if (ch === ',') {
        cur.push(field.trim());
        field = "";
      } else if (ch === '\n') {
        cur.push(field.trim());
        field = "";
        // Only add row if it has at least one non-empty cell
        if (cur.some(c => c !== "")) {
          rows.push(cur);
        }
        cur = [];
      } else {
        field += ch;
      }
    }
  }
  // Handle final field/row (no trailing newline)
  cur.push(field.trim());
  if (cur.some(c => c !== "")) {
    rows.push(cur);
  }
  return rows;
}

const ImportModal = ({onParsed,onClose}) => {
  const [mode,    setMode]    = useState("file");

  const [drag,    setDrag]    = useState(false);
  const [err,     setErr]     = useState("");

  const [fileName,setFileName]= useState("");

  const tryParse = text => {
    setErr("");
    const {rows,errors} = parseCSV(text);
    if (rows.length === 0) { setErr((errors[0]||"No valid rows found.") + (errors.length>1?`\n+${errors.length-1} more issues`:"") ); return; }
    onParsed(rows, errors);
  };

  const readFile = file => {
    if (!file) return;
    if (!file.name.match(/\.(csv|txt)$/i)) { setErr("Please select a .csv or .txt file."); return; }
    setErr(""); setFileName(file.name); setRawText("");
    const fr = new FileReader();
    fr.onload  = e => setRawText(e.target.result);
    fr.onerror = ()=> setErr("File read failed. Try the Paste method instead.");
    fr.readAsText(file);
  };

  const onDrop = e => { e.preventDefault(); setDrag(false); readFile(e.dataTransfer.files[0]); };

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>

          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0 24px 20px"}}>
          <div style={{border:`1px solid ${C.green}22`,borderRadius:"0 9px 9px 9px",padding:18,background:`${C.green}04`,marginBottom:14}}>

            {mode==="file" && !rawText && (
              <div>
                <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={onDrop}
                  style={{border:`2px dashed ${drag?C.green:C.border}`,borderRadius:10,padding:"26px 16px",textAlign:"center",background:drag?`${C.green}08`:"transparent",marginBottom:12}}>
                  <div style={{fontSize:34,marginBottom:8}}>📂</div>
                  <div style={{fontSize:13,color:C.text,fontWeight:600,marginBottom:4}}>Drag & drop your CSV here</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12}}>or pick a file below</div>
                  <input type="file" accept=".csv,.txt"
                    onChange={e=>{readFile(e.target.files[0]); e.target.value="";}}
                    style={{display:"block",fontSize:12,color:C.text,cursor:"pointer",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",width:"100%",maxWidth:280,margin:"0 auto"}}/>
                </div>
                <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>Can't upload? Switch to <b style={{color:C.green}}>Paste Text</b> tab</div>
              </div>
            )}

            {mode==="file" && rawText && (
              <div>
                <div style={{background:`${C.green}12`,border:`1px solid ${C.green}33`,borderRadius:9,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:6}}>✓ {fileName} loaded</div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",lineHeight:1.6,maxHeight:80,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{rawText.slice(0,300)}{rawText.length>300?"…":""}</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>{setRawText("");setFileName("");}}
                    style={{flex:1,padding:"10px 0",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontWeight:600,fontSize:12}}>← Change</button>
                  <button onClick={()=>tryParse(rawText)}
                    style={{flex:2,padding:"10px 0",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.green},${C.accent})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>
                    Preview & Import →
                  </button>
                </div>
              </div>
            )}

            {mode==="paste" && (
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Open your CSV in a text editor → Select All → Copy → paste below:</div>
                <textarea value={pasted} onChange={e=>setPasted(e.target.value)}
                  placeholder={"Chief Group,Department,Key Result,Weight (%),Target Date,Target,Actual\nCSO,BusDev Department,Close 10 new accounts,25,Dec 31 2026,10,0"}
                  style={{width:"100%",height:160,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:11,fontFamily:"monospace",resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.6}}
                  onFocus={e=>e.target.style.borderColor=C.green} onBlur={e=>e.target.style.borderColor=C.border}/>
                <button onClick={()=>{if(!pasted.trim()){setErr("Paste CSV content first.");return;} tryParse(pasted);}}
                  style={{marginTop:10,width:"100%",padding:"11px 0",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.green},${C.accent})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>
                  Preview & Import →
                </button>
              </div>
            )}
          </div>

          {err&&<div style={{background:`${C.red}12`,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 13px",fontSize:12,color:C.red,marginBottom:12,lineHeight:1.6,whiteSpace:"pre-wrap"}}>⚠ {err}</div>}

          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}22`,borderRadius:9,padding:"12px 14px",fontSize:11,color:C.muted,lineHeight:1.8}}>
            <b style={{color:C.accent}}>Required columns:</b>
            <div style={{fontFamily:"monospace",fontSize:10,color:C.text,background:C.surface,borderRadius:6,padding:"6px 10px",marginTop:5,wordBreak:"break-all"}}>
              Chief Group, Department, Key Result, Weight (%), Target Date, Target, Actual
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Preview Modal ─────────────────────────────────────────────────────────────
const PreviewModal = ({preview,existing,errors,onClose,onConfirm}) => {
  const ekeys = new Set(existing.map(mkey));
  const updates = preview.filter(r=>ekeys.has(mkey(r)));
  const adds    = preview.filter(r=>!ekeys.has(mkey(r)));
  const [tab,setTab] = useState("all");
  const shown = tab==="all"?preview:tab==="update"?updates:adds;
  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:20,width:"min(860px,96vw)",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:`0 0 60px ${C.accent}11`}}>
        <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <h2 style={{margin:"0 0 4px",fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.text}}>IMPORT PREVIEW</h2>
          <p style={{margin:"0 0 10px",fontSize:12,color:C.muted}}>{preview.length} rows detected — review before applying.</p>
          {errors.length>0&&<div style={{background:`${C.amber}12`,border:`1px solid ${C.amber}33`,borderRadius:7,padding:"6px 12px",fontSize:11,color:C.amber,marginBottom:8,lineHeight:1.6}}>{errors.slice(0,4).join("\n")}</div>}
          <div style={{display:"flex",gap:8}}>
            {[["all",`All (${preview.length})`,C.accent],["update",`Updates (${updates.length})`,C.amber],["add",`New (${adds.length})`,C.green]].map(([k,l,col])=>(
              <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${tab===k?col:C.border}`,background:tab===k?`${col}22`:"transparent",color:tab===k?col:C.muted,cursor:"pointer",fontWeight:700,fontSize:11}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {/* Table header */}
          <div style={{display:"grid",gridTemplateColumns:"8px 70px 130px 1fr 50px 90px 70px 70px 70px",gap:"0 8px",padding:"8px 24px",background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>
            <div/><div>Chief</div><div>Department</div><div>Key Result</div><div>Wt%</div><div>Target Date</div><div>Target</div><div>Actual</div><div>Action</div>
          </div>
          {shown.length===0&&<div style={{padding:"20px 24px",color:C.muted,fontSize:13}}>No rows.</div>}
          {shown.map((r,i)=>{
            const isU=ekeys.has(mkey(r)), col=isU?C.amber:C.green;
            const chiefCol=CHIEF_COLORS[r.chiefGroup]||C.muted;
            return (
              <div key={i} style={{display:"grid",gridTemplateColumns:"8px 70px 130px 1fr 50px 90px 70px 70px 70px",gap:"0 8px",padding:"8px 24px",borderBottom:`1px solid ${C.border}`,alignItems:"center",background:i%2?"transparent":`${C.surface}44`,fontSize:11}}>
                <div style={{width:7,height:7,borderRadius:99,background:col,flexShrink:0}}/>
                <div style={{fontWeight:700,color:chiefCol,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.chiefGroup||"—"}</div>
                <div style={{fontWeight:600,color:col,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.department}</div>
                <div style={{color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.keyResult}>{r.keyResult}</div>
                <div style={{color:C.gold,fontWeight:700}}>{r.weight}%</div>
                <div style={{color:C.muted,fontSize:10,whiteSpace:"nowrap"}}>{r.targetDate||"—"}</div>
                <div style={{color:C.muted}}>{Number(r.target).toLocaleString()}</div>
                <div style={{color:C.text,fontWeight:600}}>{Number(r.actual).toLocaleString()}</div>
                <span style={{padding:"2px 7px",borderRadius:99,fontSize:10,fontWeight:700,background:`${col}18`,color:col,border:`1px solid ${col}44`}}>{isU?"↻ Update":"+ New"}</span>
              </div>
            );
          })}
        </div>
        <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,flexWrap:"wrap",gap:10}}>
          <span style={{fontSize:13,color:C.muted}}><b style={{color:C.amber}}>{updates.length} update{updates.length!==1?"s":""}</b> · <b style={{color:C.green}}>{adds.length} new</b></span>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{padding:"9px 18px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={onConfirm} style={{padding:"9px 20px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Apply Import ({preview.length})</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── KR Detail / Edit Modal ────────────────────────────────────────────────────
// Opens when clicking a KR row — shows full details and allows editing
const KRDetailModal = ({row, onClose, onSave, onDelete}) => {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({
    chiefGroup: row.chiefGroup||"",
    department: row.department,
    _deptMode: "list",
    keyResult: row.keyResult,
    weight: row.weight,
    targetDate: row.targetDate||"",
    target: row.target,
    actual: row.actual,
  });
  const [confirmDel, setConfirmDel] = useState(false);
  const set = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const valid = form.department && form.keyResult && form.weight && form.target && String(form.actual).trim() !== "";
  const ist = {width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",boxSizing:"border-box"};
  const lbl = t => <label style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,display:"block",marginBottom:4}}>{t}</label>;
  const chiefCol = CHIEF_COLORS[row.chiefGroup||getChief(row.department)]||C.muted;

  if (confirmDel) return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,border:`1px solid ${C.red}44`,borderRadius:16,padding:28,width:"min(340px,92vw)",textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:10}}>🗑</div>
        <h3 style={{margin:"0 0 8px",color:C.text}}>Delete this KR?</h3>
        <p style={{color:C.muted,fontSize:12,marginBottom:6,lineHeight:1.6}}>{row.keyResult}</p>
        <p style={{color:C.muted,fontSize:11,marginBottom:20}}>This cannot be undone.</p>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:10,borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onDelete(row.id)} style={{flex:1,padding:10,borderRadius:8,border:"none",background:C.red,color:"#fff",cursor:"pointer",fontWeight:700}}>Delete</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:20,width:"min(520px,96vw)",maxHeight:"92vh",overflowY:"auto",boxShadow:`0 0 60px ${C.accent}11`}}>

        {/* Header */}
        <div style={{padding:"18px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:`${chiefCol}18`,color:chiefCol,border:`1px solid ${chiefCol}33`,fontWeight:700}}>{row.chiefGroup||getChief(row.department)}</span>
              <span style={{fontSize:11,color:C.muted}}>{row.department}</span>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.4}}>{row.keyResult}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
        </div>

        {/* Stats strip */}
        {!editing && (
          <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
              {[["Weight",`${row.weight}%`,C.gold],["Target",Number(row.target).toLocaleString(),C.muted],["Actual",Number(row.actual).toLocaleString(),C.text],["% Done",`${row.pct}%`,sc(row.pct)]].map(([l,v,col])=>(
                <div key={l} style={{background:C.surface,borderRadius:9,padding:"10px 12px"}}>
                  <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:800,color:col,fontFamily:"'Bebas Neue',sans-serif"}}>{v}</div>
                </div>
              ))}
            </div>
            <Bar pct={row.pct} color={sc(row.pct)} h={8}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
              <Badge score={row.pct}/>
              {row.targetDate&&<span style={{fontSize:11,color:C.muted}}>📅 {row.targetDate}</span>}
            </div>
          </div>
        )}

        {/* Actions / Edit Form */}
        <div style={{padding:"16px 20px"}}>
          {!editing ? (
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditing(true)}
                style={{flex:2,padding:"11px 0",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                ✎ Edit / Update
              </button>
              <button onClick={()=>setConfirmDel(true)}
                style={{flex:1,padding:"11px 0",borderRadius:9,border:`1px solid ${C.red}44`,background:`${C.red}10`,color:C.red,cursor:"pointer",fontWeight:700,fontSize:14}}>
                🗑 Delete
              </button>
            </div>
          ) : (
            <div>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:14,textTransform:"uppercase",letterSpacing:1.5}}>Edit Key Result</div>

              {/* Chief Group */}
              <div style={{marginBottom:11}}>
                {lbl("Chief Group")}
                <select value={form.chiefGroup} onChange={set("chiefGroup")} style={{...ist,cursor:"pointer"}}>
                  <option value="">— Select —</option>
                  {CHIEF_NAMES.map(c=><option key={c} value={c}>{c}</option>)}
                  <option value="Other">Other</option>
                </select>
              </div>

              {/* Department */}
              <div style={{marginBottom:11}}>
                {lbl("Department")}
                <select
                  value={form._deptMode==="other"?"__other__":form.department}
                  onChange={e=>{
                    const v=e.target.value;
                    if(v==="__other__") setForm(p=>({...p,_deptMode:"other",department:""}));
                    else { const auto=getChief(v); setForm(p=>({...p,_deptMode:"list",department:v,chiefGroup:auto!=="Other"?auto:p.chiefGroup})); }
                  }}
                  style={{...ist,cursor:"pointer",marginBottom:form._deptMode==="other"?6:0}}>
                  <option value="">— Select Department —</option>
                  {DEPT_LIST.map(d=><option key={d} value={d}>{d}</option>)}
                  <option value="__other__">➕ Other</option>
                </select>
                {form._deptMode==="other"&&<input value={form.department} onChange={e=>setForm(p=>({...p,department:e.target.value}))} placeholder="Type department name…" style={{...ist,borderColor:C.gold}} autoFocus/>}
              </div>

              {/* Key Result */}
              <div style={{marginBottom:11}}>
                {lbl("Key Result")}
                <input value={form.keyResult} onChange={set("keyResult")} style={ist} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>

              {/* Weight + Date */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:11}}>
                <div>{lbl("Weight (%)")} <input type="number" value={form.weight} onChange={set("weight")} style={ist} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
                <div>{lbl("Target Date")} <input value={form.targetDate} onChange={set("targetDate")} placeholder="Dec 31 2026" style={ist} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
              </div>

              {/* Target + Actual */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                <div>{lbl("Target")} <input type="number" value={form.target} onChange={set("target")} style={ist} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
                <div>{lbl("Actual")} <input type="number" value={form.actual} onChange={set("actual")} style={{...ist,borderColor:C.green}} onFocus={e=>e.target.style.borderColor=C.green} onBlur={e=>e.target.style.borderColor=C.green}/></div>
              </div>

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setEditing(false)} style={{flex:1,padding:10,borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontWeight:600}}>Cancel</button>
                <button disabled={!valid} onClick={()=>valid&&onSave(form,row.id)}
                  style={{flex:2,padding:10,borderRadius:8,border:"none",background:valid?`linear-gradient(135deg,${C.accent},${C.purple})`:C.border,color:valid?"#fff":C.muted,cursor:valid?"pointer":"not-allowed",fontWeight:700}}>
                  Save Changes
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

async function getInsights(rows) {
  const depts=[...new Set(rows.map(r=>r.department))].join(", ");
  const data=rows.map(r=>`${r.chiefGroup||getChief(r.department)}|${r.department}|${r.keyResult}|w${r.weight}%|tgt${r.target}|act${r.actual}|${r.pct}%`).join("\n");
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:`OKR advisor. Depts: ${depts}.\nReturn ONLY valid JSON:\n{"insights":["a","b","c"],"recommendations":["a","b","c"],"risks":["a","b","c"],"overallAssessment":"2 sentences"}\nData:\n${data}`}]})});
  const d=await res.json();
  return JSON.parse(d.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
}

      map[r.department].krs.push(r); map[r.department].w+=r.weight; map[r.department].s+=r.scoreEquivalent;
    });
    return Object.entries(map).map(([name,d])=>({
      name,krs:d.krs,weight:d.w,score:d.s,chief:d.chief||"Other",

    })).sort((a,b)=>b.pct-a.pct);
  },[rows]);

  const chiefStats = useMemo(()=>{
    const map={};
    rows.forEach(r=>{
      const chief=r.chiefGroup||getChief(r.department);
      if(!map[chief]) map[chief]={depts:new Set(),krs:[],w:0,s:0};
      map[chief].depts.add(r.department); map[chief].krs.push(r); map[chief].w+=r.weight; map[chief].s+=r.scoreEquivalent;
    });
    return Object.entries(map).map(([name,d])=>({
      name,depts:[...d.depts],krs:d.krs,weight:d.w,score:d.s,
      pct:d.w>0?(d.s/d.w)*100:0,
      onTrack:d.krs.filter(k=>k.pct>=80).length,
      atRisk:d.krs.filter(k=>k.pct>=60&&k.pct<80).length,
      offTrack:d.krs.filter(k=>k.pct<60).length,
      color:CHIEF_COLORS[name]||C.muted,
    })).sort((a,b)=>b.pct-a.pct);
  },[rows]);

  const totW=useMemo(()=>rows.reduce((s,r)=>s+r.weight,0),[rows]);
  const totS=useMemo(()=>rows.reduce((s,r)=>s+r.scoreEquivalent,0),[rows]);
  const ovPct=totW>0?(totS/totW)*100:0;

  const visibleRows=useMemo(()=>{
    if(filterType==="ALL") return rows;
    // Dept-only filter (legacy, kept for safety)
    if(filterType==="DEPT"&&selDept) return rows.filter(r=>r.department===selDept);
    // Chief group filter
    if(CHIEF_NAMES.includes(filterType)){
      // If a specific dept is drilled into
      if(selDept) return rows.filter(r=>r.department===selDept);
      // All depts under this chief
      return rows.filter(r=>(r.chiefGroup||getChief(r.department))===filterType);
    }
    return rows;
  },[rows,filterType,selDept]);

  const visW=visibleRows.reduce((s,r)=>s+r.weight,0);
  const visS=visibleRows.reduce((s,r)=>s+r.scoreEquivalent,0);
  const visPct=visW>0?(visS/visW)*100:0;

  // ── CRUD ──────────────────────────────────────────────────────────────────────
  const handleAdd = form => {
    const nr=compute({id:uid(),chiefGroup:form.chiefGroup,department:form.department,keyResult:form.keyResult,weight:+form.weight,targetDate:form.targetDate,target:+form.target,actual:+form.actual});
    setRows(p=>[...p,nr]); setShowAdd(false); toast$("KR added.");
  };
  const handleUpdate = (form,editId) => {
    const nr=compute({id:editId,chiefGroup:form.chiefGroup,department:form.department,keyResult:form.keyResult,weight:+form.weight,targetDate:form.targetDate,target:+form.target,actual:+form.actual});
    setRows(p=>p.map(r=>r.id===editId?nr:r));
    setDetailRow(null); toast$("KR updated.");
  };
  const handleDelete = id => { setRows(p=>p.filter(r=>r.id!==id)); setDetailRow(null); toast$("KR deleted.","warn"); };

  // ── Import ────────────────────────────────────────────────────────────────────
  const handleParsed = (parsedRows,errors) => { setShowImport(false); setPreviewData({rows:parsedRows,errors}); };

  const handleImportConfirm = () => {
    if (!previewData) return;

    // Build lookup of existing tracker rows by mkey
    const ekmap = {};
    rows.forEach(r => { ekmap[mkey(r)] = r.id; });

    let upd = 0, add = 0;
    const next = [...rows];

    previewData.rows.forEach(imp => {
      const k = mkey(imp);
      const existingId = ekmap[k];

      if (existingId !== undefined) {
        // Row already in the tracker — update it
        const idx = next.findIndex(r => r.id === existingId);
        if (idx > -1) {
          next[idx] = compute({
            ...next[idx],
            chiefGroup: imp.chiefGroup || next[idx].chiefGroup,
            targetDate: imp.targetDate || next[idx].targetDate,
            weight: imp.weight,
            target: imp.target,
            actual: imp.actual,
          });
          upd++;
        }
      } else {
        // New row — always add it, assign a new unique id
        // Do NOT register into ekmap — allow multiple CSV rows with same
        // dept+KR text to all be added as separate entries
        next.push(compute({ ...imp, id: uid() }));
        add++;
      }
    });

    setRows(next);
    setPreviewData(null);
    toast$(`Import complete — ${upd} updated, ${add} added. Total: ${next.length} KRs.`);
  };

  // ── AI ────────────────────────────────────────────────────────────────────────
  const loadAI=useCallback(async()=>{
    if(!rows.length) return;
    setLoadingAI(true); setInsights(null);
    try{setInsights(await getInsights(rows));}
    catch{setInsights({error:"Could not load insights."});}
    finally{setLoadingAI(false);}
  },[rows]);

  useEffect(()=>{if(view==="dashboard")loadAI();},[view]);

  // ── Quarterly Status helpers ──────────────────────────────────────────────────
  const updateQStatus = (dept, quarter, value) => {
    setQStatus(prev => ({ ...prev, [dept]: { ...prev[dept], [quarter]: value } }));
    setQEditCell(null);
    toast$(`${dept} — ${quarter} updated.`);
  };
  const updateQReview = (dept, quarter, value) => {
    setQStatus(prev => ({ ...prev, [dept]: { ...prev[dept], [`${quarter}r`]: value } }));
    setQEditCell(null);
    toast$(`${dept} — ${quarter} review updated.`);
  };
  const updateQNote = (dept, quarter, value) => {
    setQStatus(prev => ({ ...prev, [dept]: { ...prev[dept], [`${quarter}note`]: value } }));
  };

  // Determine on-track/delayed for a dept/quarter
  const submissionDeadline = (q) => {
    const d = schedule.submission[q]; if(!d) return null;
    return new Date(d);
  };
  const getDelay = (dept, q) => {
    const status = qStatus[dept]?.[q]||"";
    const deadline = submissionDeadline(q);
    if (!deadline || status==="Updated") return "on-track";
    const now = new Date();
    if (now > deadline && status!=="Updated") return "delayed";
    return "pending";
  };

  // Ensure any new dept from imported KRs is added to qStatus
  useEffect(() => {
    setQStatus(prev => {
      const updated = { ...prev };
      rows.forEach(r => {
        if (r.department && !updated[r.department]) {
          updated[r.department] = mkQ(r.chiefGroup || getChief(r.department));
        }
      });
      return updated;
    });
  }, [rows]);

  const qDeptsByChief = useMemo(() => {
    const map = {};
    Object.entries(qStatus).forEach(([dept, data]) => {
      const c = data.chief || "Other";
      if (!map[c]) map[c] = [];
      map[c].push({ dept, ...data });
    });
    return map;
  }, [qStatus]);

  // ── Issue helpers ─────────────────────────────────────────────────────────────
  const saveIssue = (form, id) => {
    const rec = { ...form, id: id ?? uid(), createdAt: id ? undefined : new Date().toLocaleDateString() };
    if (id) setIssues(p => p.map(i => i.id===id ? rec : i));
    else setIssues(p => [...p, rec]);
    setShowIssueForm(false); setEditIssue(null);
    toast$(id ? "Issue updated." : "Issue logged.");
  };
  const deleteIssue = id => { setIssues(p => p.filter(i => i.id!==id)); toast$("Issue deleted.","warn"); };

  const navBtn=v=>({padding:"9px 14px",borderRadius:9,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:view===v?`linear-gradient(135deg,${C.accent},${C.purple})`:"transparent",color:view===v?"#fff":C.muted});

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:${C.bg};}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:99px}
        select option{background:${C.surface};color:${C.text};}
        .dsk{display:block}.mob{display:none}
        .kr-row{transition:background .12s;}
        .kr-row:hover{background:${C.accent}0a!important;cursor:pointer}
        @media(max-width:700px){
          .hero-grid{grid-template-columns:1fr!important}
          .chief-grid{grid-template-columns:1fr!important}
          .dept-grid{grid-template-columns:1fr!important}
          .ins-grid{grid-template-columns:1fr!important}
          .dsk{display:none!important}.mob{display:flex!important}
        }
      `}</style>

      <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",paddingBottom:60}}>

        {/* Toast */}
        {toast&&<div style={{position:"fixed",top:14,right:14,zIndex:999,background:C.card,border:`1px solid ${toast.type==="success"?C.green:toast.type==="warn"?C.amber:C.red}66`,borderRadius:12,padding:"12px 18px",fontSize:13,fontWeight:600,color:toast.type==="success"?C.green:toast.type==="warn"?C.amber:C.red,maxWidth:340,animation:"fadeUp .3s ease",boxShadow:"0 8px 32px #000a"}}>{toast.msg}</div>}

        {/* Nav */}
        <nav style={{background:`${C.surface}f0`,backdropFilter:"blur(14px)",borderBottom:`1px solid ${C.border}`,padding:"0 16px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:33,height:33,borderRadius:9,background:`linear-gradient(135deg,${C.accent},${C.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800}}>◈</div>
            <div>
              <div style={{fontSize:14,fontWeight:800}}>Chiefs Group · OKR Tracker</div>
              <div style={{fontSize:10,color:C.muted}} className="dsk">Strategic Planning & Execution</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button style={navBtn("dashboard")} onClick={()=>setView("dashboard")}>◈ <span className="dsk">Dashboard</span></button>
            <button style={navBtn("tracker")}   onClick={()=>setView("tracker")}>⊞ <span className="dsk">KR Tracker</span></button>
            <button style={navBtn("quarterly")} onClick={()=>setView("quarterly")}>📋 <span className="dsk">Quarterly</span></button>
            <button style={navBtn("issues")}    onClick={()=>setView("issues")}>⚑ <span className="dsk">Issues</span></button>
            {isReadOnly ? (
              <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:8,paddingLeft:10,borderLeft:"1px solid rgba(255,255,255,.15)"}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,.5)",display:"flex",alignItems:"center",gap:4}}>
                  <span>👁</span><span className="dsk">View Only</span>
                </span>
                {onRequestEdit&&<button onClick={onRequestEdit} style={{padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>🔒 Edit</button>}
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:8,paddingLeft:10,borderLeft:"1px solid rgba(255,255,255,.15)"}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>✏ Editor</span>
                <button onClick={()=>{ sessionStorage.removeItem("chiefs_auth"); window.location.reload(); }} style={{padding:"5px 10px",borderRadius:7,border:"1px solid rgba(255,255,255,.15)",background:"transparent",color:"rgba(255,255,255,.4)",cursor:"pointer",fontSize:10}}>Sign out</button>
              </div>
            )}
          </div>
        </nav>

        <div style={{maxWidth:1340,margin:"0 auto",padding:"20px 14px"}}>

          {/* ═══════════════ DASHBOARD ═══════════════ */}
          {view==="dashboard"&&(
            <div style={{display:"flex",flexDirection:"column",gap:24}}>
              <div>
                <h1 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:800}}>Overall KR Status</h1>
                <p style={{fontSize:12,color:C.muted,marginTop:3}}>All KR targets at specified dates · {rows.length} KRs · {allDepts.length} departments</p>
              </div>

              {/* Hero */}
              <div className="hero-grid" style={{background:`linear-gradient(135deg,${C.card},#1a1f38)`,border:`1px solid ${C.accent}33`,borderRadius:18,padding:"24px 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Combined OKR Score</div>
                  <div style={{fontSize:"clamp(52px,10vw,84px)",fontWeight:800,fontFamily:"'Bebas Neue'",letterSpacing:2,color:rows.length?sc(ovPct):C.muted,lineHeight:1}}>{rows.length?ovPct.toFixed(1)+"%":"—"}</div>
                  <div style={{marginTop:10,marginBottom:14}}><Bar pct={ovPct} color={sc(ovPct)} h={10}/></div>
                  {rows.length>0&&<Badge score={ovPct}/>}
                  <div style={{marginTop:10,fontSize:12,color:C.muted}}>{rows.length===0?"No data — go to KR Tracker to import.":<>Score <b style={{color:C.text}}>{totS.toFixed(1)}</b>/{totW} pts · {allDepts.length} Depts · {rows.length} KRs</>}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["On Track",rows.filter(r=>r.pct>=80).length,"KRs",C.green,"✓"],["At Risk",rows.filter(r=>r.pct>=60&&r.pct<80).length,"KRs",C.amber,"⚠"],["Off Track",rows.filter(r=>r.pct<60).length,"KRs",C.red,"✕"],["Depts",allDepts.length,"Tracked",C.accent,"◈"]].map(([l,v,s,col,ic])=>(
                    <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",top:-12,right:-8,fontSize:50,opacity:.04}}>{ic}</div>
                      <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>{l}</div>
                      <div style={{fontSize:"clamp(24px,5vw,32px)",fontWeight:800,color:col,fontFamily:"'Bebas Neue'",lineHeight:1.1}}>{v}</div>
                      <div style={{fontSize:11,color:C.muted}}>{s}</div>
                    </div>
                  ))}
                </div>
              </div>

              {rows.length===0?(
                <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:18,padding:"48px 24px",textAlign:"center"}}>
                  <div style={{fontSize:48,marginBottom:14}}>📊</div>
                  <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>No OKR Data Loaded</div>
                  <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.7}}>Go to <b style={{color:C.accent}}>KR Tracker</b> → download template → fill in KRs → import.</div>
                  <button onClick={()=>setView("tracker")} style={{padding:"12px 28px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>⊞ Go to KR Tracker</button>
                </div>
              ):(
                <>
                  {/* Chiefs Group */}
                  <div>
                    <h2 style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Chiefs Group Performance</h2>
                    <div className="chief-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                      {chiefStats.map(chief=>(
                        <div key={chief.name} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
                          <div style={{height:4,background:`linear-gradient(90deg,${chief.color}44,${chief.color})`}}/>
                          <div style={{padding:18}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <div style={{width:38,height:38,borderRadius:10,background:`${chief.color}20`,border:`1px solid ${chief.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:chief.color}}>{chief.name}</div>
                                <div>
                                  <div style={{fontSize:14,fontWeight:800}}>{chief.name}</div>
                                  <div style={{fontSize:11,color:C.muted}}>{chief.depts.length} dept{chief.depts.length!==1?"s":""} · {chief.krs.length} KRs</div>
                                </div>
                              </div>
                              <Badge score={chief.pct}/>
                            </div>
                            <div style={{fontSize:40,fontWeight:800,fontFamily:"'Bebas Neue'",letterSpacing:2,color:sc(chief.pct),lineHeight:1,marginBottom:8}}>{chief.pct.toFixed(1)}%</div>
                            <Bar pct={chief.pct} color={sc(chief.pct)} h={7}/>
                            <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
                              {[[chief.onTrack,C.green,"On Track"],[chief.atRisk,C.amber,"At Risk"],[chief.offTrack,C.red,"Off Track"]].map(([n,col,lbl])=>(
                                <div key={lbl} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 9px",borderRadius:99,background:`${col}15`,border:`1px solid ${col}33`}}>
                                  <span style={{fontSize:12,fontWeight:800,color:col}}>{n}</span>
                                  <span style={{fontSize:10,color:col,opacity:.8}}>{lbl}</span>
                                </div>
                              ))}
                            </div>
                            <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",flexWrap:"wrap",gap:5}}>
                              {chief.depts.map(d=>(
                                <span
                                  key={d}
                                  onClick={()=>{ setFilterType(chief.name); setSelDept(d); setView("tracker"); }}
                                  title={`View ${d} KRs in Tracker`}
                                  style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:`${chief.color}12`,color:chief.color,border:`1px solid ${chief.color}33`,fontWeight:600,cursor:"pointer",transition:"all .15s"}}
                                  onMouseEnter={e=>{ e.currentTarget.style.background=chief.color; e.currentTarget.style.color="#fff"; }}
                                  onMouseLeave={e=>{ e.currentTarget.style.background=`${chief.color}12`; e.currentTarget.style.color=chief.color; }}
                                >{d}</span>
                              ))}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Dept Performance */}
                  <div>
                    <h2 style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Department Performance</h2>
                    <div className="dept-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
                      {deptStats.map((dept,rank)=>{
                        const dc=colorMap[dept.name]||C.accent, cc=CHIEF_COLORS[dept.chief]||C.muted;
                        return (
                          <div key={dept.name} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
                            <div style={{height:4,background:`linear-gradient(90deg,${dc}44,${dc})`}}/>
                            <div style={{padding:18}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                                <div style={{display:"flex",alignItems:"center",gap:9,minWidth:0}}>
                                  <div style={{width:32,height:32,borderRadius:8,background:`${dc}20`,border:`1px solid ${dc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:dc,flexShrink:0}}>{dept.name[0]}</div>
                                  <div style={{minWidth:0}}>
                                    <div style={{fontSize:13,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dept.name}</div>
                                    <span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontWeight:700}}>{dept.chief}</span>
                                  </div>
                                </div>
                                <Badge score={dept.pct} small/>
                              </div>
                              <div style={{fontSize:34,fontWeight:800,fontFamily:"'Bebas Neue'",letterSpacing:2,color:sc(dept.pct),lineHeight:1,marginBottom:6}}>{dept.pct.toFixed(1)}%</div>
                              <Bar pct={dept.pct} color={sc(dept.pct)} h={7}/>
                              <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                                {[[dept.onTrack,C.green,"On Track"],[dept.atRisk,C.amber,"At Risk"],[dept.offTrack,C.red,"Off Track"]].map(([n,col,lbl])=>(
                                  <div key={lbl} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:99,background:`${col}15`,border:`1px solid ${col}33`}}>
                                    <span style={{fontSize:12,fontWeight:800,color:col}}>{n}</span>
                                    <span style={{fontSize:10,color:col,opacity:.8}}>{lbl}</span>
                                  </div>
                                ))}
                              </div>
                              <div style={{display:"flex",gap:14,marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.muted}}>
                                <span>Wt <b style={{color:C.text}}>{dept.weight}%</b></span>
                                <span>Score <b style={{color:dc}}>{dept.score.toFixed(1)}</b></span>
                                <span>KRs <b style={{color:C.text}}>{dept.krs.length}</b></span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Rankings */}
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
                    <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
                      <h2 style={{fontSize:14,fontWeight:800,margin:0}}>Department Rankings</h2>
                      <p style={{fontSize:12,color:C.muted,margin:"2px 0 0"}}>Sorted by weighted achievement score</p>
                    </div>
                    {deptStats.map((dept,i)=>{
                      const dc=colorMap[dept.name]||C.accent, cc=CHIEF_COLORS[dept.chief]||C.muted;
                      return (
                        <div key={dept.name} style={{display:"grid",gridTemplateColumns:"36px 1fr 140px 90px 90px 110px",gap:0,padding:"11px 20px",alignItems:"center",borderBottom:i<deptStats.length-1?`1px solid ${C.border}`:"none"}}>
                          <div style={{fontSize:18,fontWeight:800,fontFamily:"'Bebas Neue'",color:i===0?C.gold:i===1?"#c0c0c0":i===2?"#cd7f32":C.muted}}>{i+1}</div>
                          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                            <div style={{width:7,height:7,borderRadius:99,background:dc,flexShrink:0}}/>
                            <span style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dept.name}</span>
                            <span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontWeight:700,flexShrink:0}} className="dsk">{dept.chief}</span>
                          </div>
                          <div className="dsk" style={{paddingRight:12}}><Bar pct={dept.pct} color={sc(dept.pct)} h={5}/></div>
                          <div style={{fontSize:20,fontWeight:800,fontFamily:"'Bebas Neue'",color:sc(dept.pct)}}>{dept.pct.toFixed(1)}%</div>
                          <div className="dsk" style={{fontSize:12,fontWeight:700,color:dc}}>{dept.score.toFixed(1)}pts</div>
                          <Badge score={dept.pct}/>
                        </div>
                      );
                    })}
                  </div>

                  {/* AI Insights */}
                  <div style={{background:C.card,border:`1px solid ${C.purple}33`,borderRadius:18,padding:22}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
                      <div>
                        <h2 style={{margin:0,fontSize:15,fontWeight:800}}>✦ AI Strategic Insights</h2>
                        <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Powered by Claude · {rows.length} KRs · {allDepts.length} departments</p>
                      </div>
                      <button onClick={loadAI} disabled={loadingAI} style={{padding:"8px 16px",borderRadius:9,background:`${C.purple}22`,border:`1px solid ${C.purple}55`,color:C.purple,cursor:"pointer",fontWeight:700,fontSize:12}}>{loadingAI?"⟳ Analyzing...":"↺ Refresh"}</button>
                    </div>
                    {loadingAI&&<div style={{display:"flex",gap:10,alignItems:"center",color:C.muted,padding:"16px 0"}}><div style={{width:16,height:16,border:`2px solid ${C.purple}44`,borderTopColor:C.purple,borderRadius:"50%",animation:"spin .8s linear infinite"}}/> Analyzing…</div>}
                    {insights&&!insights.error&&(
                      <div style={{display:"flex",flexDirection:"column",gap:14}}>
                        <div className="ins-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
                          {[["📊 Insights",insights.insights,C.accent],["🎯 Recommendations",insights.recommendations,C.green],["⚠ Risk Flags",insights.risks,C.red]].map(([title,items,col])=>(
                            <div key={title} style={{background:`${col}0a`,border:`1px solid ${col}22`,borderRadius:12,padding:16}}>
                              <div style={{fontSize:12,fontWeight:700,color:col,marginBottom:12}}>{title}</div>
                              {(items||[]).map((item,i)=>(
                                <div key={i} style={{display:"flex",gap:8,marginBottom:9,alignItems:"flex-start"}}>
                                  <span style={{color:col,fontWeight:800,flexShrink:0,fontSize:12}}>{i+1}.</span>
                                  <span style={{fontSize:12,color:C.text,lineHeight:1.5}}>{item}</span>
                                </div>
                              ))}
                            </div>
                          ))}
                        </div>
                        {insights.overallAssessment&&<div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}22`,borderRadius:10,padding:14}}><span style={{fontSize:11,color:C.accent,fontWeight:700,marginRight:8}}>EXEC SUMMARY</span><span style={{fontSize:12,color:C.text,lineHeight:1.6}}>{insights.overallAssessment}</span></div>}
                      </div>
                    )}
                    {insights?.error&&<div style={{color:C.red,fontSize:13}}>{insights.error}</div>}
                  </div>
                </>
              )}
            </div>
          )}

          {/* ═══════════════ TRACKER ═══════════════ */}
          {view==="tracker"&&(
            <div>
              <div style={{marginBottom:14}}>
                <h1 style={{fontSize:"clamp(18px,5vw,22px)",fontWeight:800}}>KR Tracker</h1>
                <p style={{fontSize:12,color:C.muted,marginTop:3}}>{rows.length} KRs · {allDepts.length} departments · click any row to view, edit or delete</p>
              </div>

              {/* Toolbar */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"11px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

                      <col style={{width:138}}/>
                      <col/>
                      <col style={{width:50}}/>
                      <col style={{width:88}}/>

              </div>

              {/* Schedule Card — editable */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:14}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>

                    </div>

                                onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent} onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                {schedule.submission[q]}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {/* OKR Review Dates */}
                  <div>
                    <div style={{background:`linear-gradient(90deg,${C.gold},${C.amber})`,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

                        <tr style={{background:C.surface}}>

                                        onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); if(e.key==="Escape") setEditSched(null); }}
                                        style={{width:"100%",background:C.surface,border:`1px solid ${C.gold}`,borderRadius:6,color:C.text,fontSize:10,padding:"3px 5px",textAlign:"center",outline:"none"}}/>
                                    ):(
                                      <span onClick={()=>setEditSched({type:"rev",chief,quarter:q})} style={{fontSize:10,color:C.muted,cursor:"pointer",padding:"2px 4px",borderRadius:4,border:"1px solid transparent",transition:"border .15s"}}
                                        onMouseEnter={e=>e.currentTarget.style.borderColor=C.gold} onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                        {val||"—"}
                                      </span>
                                    )}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              {/* Overview stats — clickable to drill down */}
              {(()=>{
                const all=Object.values(qStatus);
                const allDeptEntries=Object.entries(qStatus); // [[dept, data], ...]
                const tots={};
                ["Q1","Q2","Q3","Q4"].forEach(q=>{
                  tots[q]={updated:0,ongoing:0,none:0,blank:0,delayed:0,total:all.length};
                  all.forEach(d=>{ const s=d[q]||""; const dl=new Date()>new Date(schedule.submission[q]||"9999"); if(s==="Updated") tots[q].updated++; else if(s==="Ongoing Update") tots[q].ongoing++; else if(s==="No Update"){tots[q].none++;if(dl)tots[q].delayed++;} else tots[q].blank++; });
                });

                // Build the filtered dept list when a status is clicked
                const filteredDepts = qFilter ? allDeptEntries.filter(([dept,data])=>{
                  const s=data[qFilter.quarter]||"";
                  if(qFilter.status==="Updated") return s==="Updated";
                  if(qFilter.status==="Ongoing Update") return s==="Ongoing Update";
                  if(qFilter.status==="No Update") return s==="No Update";
                  if(qFilter.status==="Delayed") { const dl=new Date()>new Date(schedule.submission[qFilter.quarter]||"9999"); return s==="No Update"&&dl; }
                  if(qFilter.status==="Pending") return !s;
                  return false;
                }) : [];

                const statusRows=[
                  ["✓ Updated","Updated",C.green],
                  ["↻ Ongoing","Ongoing Update",C.amber],
                  ["✕ No Update","No Update",C.red],
                  ["⚠ Delayed","Delayed","#f75f5f"],
                  ["— Pending","Pending",C.muted],

                      </div>

                        {["Q1","Q2","Q3","Q4"].map(q=>{

                          return (
                            <div key={q} style={{background:C.surface,borderRadius:9,padding:"11px 13px",border:`1px solid ${qFilter?.quarter===q?C.accent:C.border}`,transition:"border .2s"}}>

                                <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:99}}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                {statusRows.map(([label,status,c])=>{
                                  const n = status==="Updated"?t.updated:status==="Ongoing Update"?t.ongoing:status==="No Update"?t.none:status==="Delayed"?t.delayed:t.blank;

                                  const isActive=qFilter?.quarter===q&&qFilter?.status===status;
                                  return (
                                    <div key={status}
                                      onClick={()=>setQFilter(isActive?null:{quarter:q,status})}
                                      style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 6px",borderRadius:6,cursor:n>0?"pointer":"default",background:isActive?`${c}22`:"transparent",border:`1px solid ${isActive?c+"66":"transparent"}`,transition:"all .15s",opacity:n===0?.4:1}}
                                      onMouseEnter={e=>{ if(n>0) e.currentTarget.style.background=`${c}15`; }}
                                      onMouseLeave={e=>{ e.currentTarget.style.background=isActive?`${c}22`:"transparent"; }}>
                                      <span style={{color:isActive?c:C.muted}}>{label}</span>
                                      <span style={{fontWeight:800,color:isActive?c:n>0?c:C.muted}}>{n}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Drill-down panel — appears when a status is clicked */}
