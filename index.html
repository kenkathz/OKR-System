// ─── STORAGE LAYER: Firebase Realtime Database + localStorage fallback ─────────
//  RTDB path layout:
//    okr/users          → [ ...user objects ]
//    okr/years          → [ 2026, 2027, ... ]
//    okr/year_2026      → { rows, qStatus, schedule, issues }
//
const DB_ROOT = "okr";
const db      = window.__db;
const USE_FB  = window.__firebaseReady;

const LS_KEYS = {
  yearStore: "okr_yearStore",
  years:     "okr_years",
  users:     "okr_users",
};

const lsSave = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
};
const lsLoad = (key, fallback) => {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; } catch(e) { return fallback; }
};

// ── Realtime Database helpers ─────────────────────────────────────────────────
const rtSet = async (path, data) => {
  if (!USE_FB) return;
  try { await db.ref(DB_ROOT + "/" + path).set(data); }
  catch(e) { console.warn("RTDB write failed:", e); }
};
const rtGet = async (path) => {
  if (!USE_FB) return null;
  try { const snap = await db.ref(DB_ROOT + "/" + path).once("value"); return snap.val(); }
  catch(e) { console.warn("RTDB read failed:", e); return null; }
};

// ── Unified save functions ────────────────────────────────────────────────────
const saveUsers = async (users) => {
  lsSave(LS_KEYS.users, users);
  await rtSet("users", users);
};
const saveYears = async (years) => {
  lsSave(LS_KEYS.years, years);
  await rtSet("years", years);
};
const saveYearData = async (year, data) => {
  const cached = lsLoad(LS_KEYS.yearStore, {});
  lsSave(LS_KEYS.yearStore, { ...cached, [year]: data });
  // Strip undefined values — RTDB does not accept undefined
  const clean = JSON.parse(JSON.stringify(data));
  await rtSet("year_" + year, clean);
};

// ── Load everything from RTDB on startup ──────────────────────────────────────
const loadAllFromFirebase = async () => {
  if (!USE_FB) return null;
  try {
    const snap = await db.ref(DB_ROOT).once("value");
    const root = snap.val();
    if (!root) return null;

    const users     = root.users || null;
    const years     = root.years || null;
    if (!years || !years.length) return null;

    const yearStore = {};
    years.forEach(y => {
      const ydata = root["year_" + y] || mkEmptyYearData(y);
      yearStore[y] = {
        ...ydata,
        rows: (ydata.rows || []).map(r => compute(r)),
      };
    });

    return { users, years, yearStore };
  } catch(e) {
    console.warn("Firebase load failed, using localStorage cache:", e);
    return null;
  }
};

// ─── CSV PARSING ──────────────────────────────────────────────────────────────
function parseCSV(rawText) {
  let text = rawText.replace(/^\uFEFF/, "");
  const allRows = parseCSVRows(text);
  if (allRows.length < 2) return { rows:[], errors:["File has no data rows."] };
  const ALIAS = {
    "key result":"keyresult","key_result":"keyresult","kr":"keyresult","key results":"keyresult","keyresults":"keyresult",
    "weight (%)":"weight","kr weight":"weight","weight(%)":"weight","krweight":"weight","weight%":"weight",
    "actual achievement":"actual","achievement":"actual","actuals":"actual",
    "targets":"target","target value":"target",
    "chief group":"chiefgroup","chief":"chiefgroup","chiefgroup":"chiefgroup","group":"chiefgroup",
    "target date":"targetdate","date":"targetdate","due date":"targetdate",
    "initiative":"initiative","key metric":"keyresult",
  };
  const headerRowIdx = allRows.findIndex(r => r.some(c => c.trim() !== ""));
  if (headerRowIdx === -1) return { rows:[], errors:["No header row found."] };
  const rawHdrs = allRows[headerRowIdx];
  const hdrs = rawHdrs.map(h => {
    const n = h.replace(/"/g,"").trim().toLowerCase();
    return ALIAS[n] !== undefined ? ALIAS[n] : n;
  });
  const NEED = ["department","keyresult","target","actual"];
  const miss = NEED.filter(n => !hdrs.includes(n));
  if (miss.length) return { rows:[], errors:[`Missing required columns: ${miss.join(", ")}.\nDetected headers: ${rawHdrs.join(" | ")}`] };
  const rows = [], errors = [];
  const dataRows = allRows.slice(headerRowIdx + 1);
  dataRows.forEach((cols, i) => {
    if (cols.every(c => c.trim() === "")) return;
    const o = {};
    hdrs.forEach((h, idx) => { o[h] = (cols[idx] !== undefined ? cols[idx] : "").trim(); });
    if (!o.department || !o.keyresult) {
      if (cols.some(c => c.trim() !== "")) errors.push(`Row ${i+2}: missing Department or Key Result — skipped`);
      return;
    }
    const w = o.weight ? parseFloat(o.weight) : 100;
    const t = parseFloat(o.target), a = parseFloat(o.actual);
    if (isNaN(t) || isNaN(a)) { errors.push(`Row ${i+2} [${o.keyresult.slice(0,25)}]: Target/Actual must be numbers — skipped`); return; }
    rows.push({ department: o.department, keyResult: o.keyresult, chiefGroup: o.chiefgroup || getChief(o.department), targetDate: o.targetdate || "", weight: isNaN(w)?100:w, target: t, actual: a });
  });
  return { rows, errors };
}

function parseCSVRows(text) {
  const rows = [];
  let cur = [], field = "", inQuote = false;
  let s = "";
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '\r') { s += '\n'; if (text[i+1] === '\n') i++; } else s += text[i];
  }
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuote) {
      if (ch === '"') { if (i + 1 < s.length && s[i+1] === '"') { field += '"'; i++; } else inQuote = false; }
      else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { cur.push(field.trim()); field = ""; }
      else if (ch === '\n') { cur.push(field.trim()); field = ""; if (cur.some(c => c !== "")) rows.push(cur); cur = []; }
      else field += ch;
    }
  }
  cur.push(field.trim());
  if (cur.some(c => c !== "")) rows.push(cur);
  return rows;
}

// ─── SESSION STORAGE KEY ─────────────────────────────────────────────────────
const SESSION_KEY     = "okr_session";
const INACTIVITY_MS   = 10 * 60 * 1000; // 10 minutes

const saveSession = (authUser) => {
  try {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      authUser,
      lastActive: Date.now(),
    }));
  } catch(e) {}
};

const loadSession = () => {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const { authUser, lastActive } = JSON.parse(raw);
    if (!authUser) return null;
    // Expire if inactive > 10 min
    if (Date.now() - lastActive > INACTIVITY_MS) {
      sessionStorage.removeItem(SESSION_KEY);
      return null;
    }
    return authUser;
  } catch(e) { return null; }
};

const clearSession = () => { try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {} };

// ─── AUTH GATE ────────────────────────────────────────────────────────────────
function AuthGate() {
  const [users,    setUsers]    = useState(() => lsLoad(LS_KEYS.users, INITIAL_USERS_DEFAULT));
  const savedSession             = loadSession();
  const [authUser, setAuthUser] = useState(savedSession);
  const [screen,   setScreen]   = useState(savedSession ? "app" : "login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error,    setError]    = useState("");
  const [loading,  setLoading]  = useState(false);

  // Persist users (Firebase + localStorage cache)
  useEffect(() => { saveUsers(users); }, [users]);

  // ── Inactivity timer — resets on any user interaction ──
  useEffect(() => {
    if (screen !== "app") return;
    let timer;
    const resetTimer = () => {
      clearTimeout(timer);
      // Refresh lastActive in session
      if (authUser) saveSession(authUser);
      timer = setTimeout(() => {
        clearSession();
        setAuthUser(null);
        setScreen("login");
        setUsername(""); setPassword(""); setError("");
      }, INACTIVITY_MS);
    };
    const events = ["mousemove","keydown","mousedown","touchstart","scroll","click"];
    events.forEach(e => window.addEventListener(e, resetTimer, { passive: true }));
    resetTimer(); // start the timer immediately
    return () => {
      clearTimeout(timer);
      events.forEach(e => window.removeEventListener(e, resetTimer));
    };
  }, [screen, authUser]);

  const login = () => {
    setError("");
    if (!username.trim() || !password.trim()) { setError("Enter username and password."); return; }
    setLoading(true);
    setTimeout(() => {
      const user = users.find(u => u.username.toLowerCase() === username.trim().toLowerCase() && u.password === password.trim());
      if (user) {
        const au = { id:user.id, username:user.username, role:user.role, name:user.name };
        setAuthUser(au);
        saveSession(au);
        setScreen("app");
      } else {
        setError("Incorrect username or password.");
        setPassword("");
      }
      setLoading(false);
    }, 400);
  };

  const enterAsViewer = () => {
    const au = { id:"viewer", username:"guest", role:"viewer", name:"Guest Viewer" };
    setAuthUser(au);
    saveSession(au);
    setScreen("app");
  };

  const logout = () => {
    clearSession();
    setAuthUser(null);
    setScreen("login");
    setUsername(""); setPassword(""); setError("");
  };

  if (screen === "app" && authUser) {
    return <App authUser={authUser} users={users} onUsersChange={setUsers} onLogout={logout}/>;
  }

  return (
    <div style={{minHeight:"100vh",background:C2.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Sans, system-ui, sans-serif",padding:16}}>
      <div style={{background:C2.card,border:`1px solid ${C2.border}`,borderRadius:20,padding:"36px 32px",width:"min(420px,96vw)",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px",boxShadow:`0 8px 24px ${C2.accent}44`}}>◈</div>
          <div style={{fontSize:21,fontWeight:800,color:C2.text,letterSpacing:.5}}>CSO OKR Tracker</div>
          <div style={{fontSize:13,color:C2.muted,marginTop:3}}>OKR Management System · Sign In</div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,display:"block",marginBottom:5}}>Username</label>
          <input value={username} onChange={e=>{setUsername(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter your username" autoFocus
            style={{width:"100%",background:C2.surface,border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:10}}
            onFocus={e=>e.target.style.borderColor=C2.accent} onBlur={e=>e.target.style.borderColor=error?C2.red:C2.border}/>
          <label style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,display:"block",marginBottom:5}}>Password</label>
          <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter your password"
            style={{width:"100%",background:C2.surface,border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=C2.accent} onBlur={e=>e.target.style.borderColor=error?C2.red:C2.border}/>
        </div>
        {error&&<div style={{fontSize:12,color:C2.red,marginBottom:12,textAlign:"center",background:`${C2.red}12`,padding:"8px 12px",borderRadius:7}}>{error}</div>}
        <button onClick={login} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,color:"#fff",cursor:loading?"not-allowed":"pointer",fontWeight:700,fontSize:15,marginBottom:12,opacity:loading?0.7:1,boxShadow:`0 4px 16px ${C2.accent}44`}}>
          {loading?"Signing in…":"Sign In →"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:1,background:C2.border}}/>
          <span style={{fontSize:11,color:C2.muted}}>or</span>
          <div style={{flex:1,height:1,background:C2.border}}/>
        </div>
        <button onClick={enterAsViewer} style={{width:"100%",padding:"11px",borderRadius:10,border:`1px solid ${C2.green}55`,background:`${C2.green}12`,color:C2.green,cursor:"pointer",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span style={{fontSize:16}}>👁</span> Continue as Viewer
        </button>
        <div style={{marginTop:16,textAlign:"center",fontSize:11,color:`${C2.muted}88`}}>
          Contact your administrator for login credentials
        </div>
      </div>
    </div>
  );
}

const ImportModal = ({onParsed,onClose}) => {
  const [mode, setMode] = useState("file");
  const [pasted, setPasted] = useState("");
  const [drag, setDrag] = useState(false);
  const [err, setErr] = useState("");
  const [rawText, setRawText] = useState("");
  const [fileName, setFileName] = useState("");

  const tryParse = text => {
    setErr("");
    const {rows,errors} = parseCSV(text);
    if (rows.length === 0) { setErr((errors[0]||"No valid rows found.") + (errors.length>1?`\n+${errors.length-1} more issues`:"")); return; }
    onParsed(rows, errors);
  };

  const readFile = file => {
    if (!file) return;
    if (!file.name.match(/\.(csv|txt)$/i)) { setErr("Please select a .csv or .txt file."); return; }
    setErr(""); setFileName(file.name); setRawText("");
    const fr = new FileReader();
    fr.onload = e => setRawText(e.target.result);
    fr.onerror = () => setErr("File read failed. Try the Paste method instead.");
    fr.readAsText(file);
  };

  const onDrop = e => { e.preventDefault(); setDrag(false); readFile(e.dataTransfer.files[0]); };

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>

            <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Load or update KRs from your filled template</p>

        </div>

// ─── AI INSIGHTS ──────────────────────────────────────────────────────────────
function getInsights(rows) {
  const deptMap = {};
  rows.forEach(r => { const d=r.department; if(!deptMap[d]) deptMap[d]={chief:r.chiefGroup||getChief(r.department),krs:[],w:0,s:0}; deptMap[d].krs.push(r); deptMap[d].w+=r.weight; deptMap[d].s+=r.scoreEquivalent; });
  const totW=rows.reduce((s,r)=>s+r.weight,0), totS=rows.reduce((s,r)=>s+r.scoreEquivalent,0);
  const ovPct=totW>0?((totS/totW)*100).toFixed(1):"0.0";
  const summary=Object.entries(deptMap).map(([name,d])=>{
    const pct=d.w>0?((d.s/d.w)*100).toFixed(1):"0.0";
    return name+"("+d.chief+"):"+pct+"%,KRs:"+d.krs.map(k=>k.keyResult+"="+k.pct+"%").join(";");
  }).join("\n");
  const body = JSON.stringify({
    model:"claude-sonnet-4-20250514", max_tokens:1000,
    system:"You are an OKR strategist. Return ONLY valid JSON, no markdown.",
    messages:[{role:"user",content:"OKR data for Chiefs Group. Overall: "+ovPct+"%. Departments:\n"+summary+"\nReturn JSON: {\"insights\":[\"...\",\"...\",\"...\"],\"recommendations\":[\"...\",\"...\",\"...\"],\"risks\":[\"...\",\"...\",\"...\"],\"overallAssessment\":\"2 sentences\"}"}]
  });
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:body
  })
    .then(function(res){ return res.json(); })
    .then(function(d){
      if(d.error) throw new Error(d.error.message||"API error");
      return JSON.parse(d.content.map(function(b){return b.text||"";}).join("").trim());
    });
}

// Runs once on load — deletes any department name not in the official list
const OFFICIAL_DEPTS = new Set([
  "Legal","Internal Audit",
  "Marketing","PMO","Business Development","Strategy Planning and Execution",
  "Safety and Security","Supply Chain","Human Capital","Admin","Engineering",
  "Security Systems and Technical Support","Site Reliability Engineer","Software Development",
  "Research and Development","Governance, Risk and Compliance","CHD (Frontline)","CHD (Backend)",
  "Accounting and Finance (INC)","Accounting and Finance (EMSI)","Accounting and Finance (SOL)",
  "Cash Logistics","Finance Operations","Cash Management","Maintenance",
  "Financial Data Management Support","Collection","Reconciliation",
]);

// Also accept trimmed variants (e.g. "Supply Chain " with trailing space from old data)
const isDeptOfficial = (dept) => OFFICIAL_DEPTS.has(dept) || OFFICIAL_DEPTS.has(dept.trim());

const cleanStaleQStatus = (qStatus) => {
  const cleaned = {};
  Object.entries(qStatus).forEach(([dept, data]) => {
    const trimmed = dept.trim();
    if (isDeptOfficial(dept)) {
      // Normalise key to trimmed version in case Firebase has trailing spaces
      cleaned[trimmed] = { ...data, chief: data.chief || "Other" };
    } else {
      console.log("🧹 Removed stale dept:", JSON.stringify(dept));
    }
  });
  return cleaned;
};

const cleanYearStore = (yearStore) => {
  const cleaned = {};
  Object.entries(yearStore).forEach(([year, ydata]) => {
    cleaned[year] = {
      ...ydata,
      qStatus: ydata.qStatus ? cleanStaleQStatus(ydata.qStatus) : {},
    };
  });
  return cleaned;
};

            <div>{lbl("Issue Type *")}<select value={form.type} onChange={set("type")} style={{...ist,cursor:"pointer"}}><option value="">— Select type —</option>{ISSUE_TYPE_LIST.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
            <div>{lbl("Status *")}<select value={form.status} onChange={set("status")} style={{...ist,cursor:"pointer"}}>{ISSUE_STATUS_LIST.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          </div>
          <div>{lbl("Issue / Description *")}<textarea value={form.description} onChange={set("description")} rows={3} placeholder="Describe the issue or dependency clearly..." style={{...ist,resize:"vertical",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor="#4f8ef7"} onBlur={e=>e.target.style.borderColor="#1e2640"}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>{lbl("Raised By (Department)")}<select value={form.raisedBy} onChange={set("raisedBy")} style={{...ist,cursor:"pointer"}}><option value="">— Select department —</option>{deptList.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
            <div>{lbl("Target Closure Date")}<input value={form.targetClosure} onChange={set("targetClosure")} placeholder="e.g. Jul 30 2026" style={ist} onFocus={e=>e.target.style.borderColor="#4f8ef7"} onBlur={e=>e.target.style.borderColor="#1e2640"}/></div>
          </div>
          <div>
            {lbl(`Assigned To — Resolving Department(s) (${form.assignedTo.length} selected)`)}
            <div style={{background:"#111420",border:"1px solid #1e2640",borderRadius:9,padding:"10px 12px",maxHeight:160,overflowY:"auto",display:"flex",flexWrap:"wrap",gap:6}}>
              {deptList.map(dept=>{
                const sel=form.assignedTo.includes(dept);
                return <div key={dept} onClick={()=>toggleDept(dept)} style={{padding:"4px 11px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${sel?"#4f8ef7":"#1e2640"}`,background:sel?"#4f8ef722":"transparent",color:sel?"#4f8ef7":"#6b7399",userSelect:"none"}}>{sel&&"✓ "}{dept}</div>;
              })}
            </div>
          </div>
          <div>{lbl("Remarks / Additional Notes")}<textarea value={form.remarks} onChange={set("remarks")} rows={2} placeholder="Any additional context..." style={{...ist,resize:"vertical",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor="#4f8ef7"} onBlur={e=>e.target.style.borderColor="#1e2640"}/></div>
          <div style={{display:"flex",gap:10,paddingTop:4}}>
            <button onClick={onClose} style={{flex:1,padding:"10px 0",borderRadius:9,border:"1px solid #1e2640",background:"transparent",color:"#6b7399",cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button disabled={!valid} onClick={()=>valid&&onSave(form,(issue||{}).id)} style={{flex:2,padding:"10px 0",borderRadius:9,border:"none",background:valid?"linear-gradient(135deg,#4f8ef7,#9b7ef8)":"#1e2640",color:valid?"#fff":"#6b7399",cursor:valid?"pointer":"not-allowed",fontWeight:700,fontSize:14}}>{issue?"Save Changes":"Log Issue"}</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App({ authUser, users, onUsersChange, onLogout }) {
  const isReadOnly = (authUser||{}).role === "viewer";
  const isAdmin    = (authUser||{}).role === "admin";
  const [showUserMgmt, setShowUserMgmt] = useState(false);

  // ── Year state — starts from localStorage cache, then syncs Firebase ──
  const [years,     setYears]     = useState(() => initYearsFromStorage());
  const [yearStore, setYearStore] = useState(() => initYearStoreFromStorage());
  const [activeYear, setActiveYear] = useState(() => {
    const saved = initYearsFromStorage();
    return saved[saved.length - 1] || CURRENT_YEAR;
  });
  const [fbLoading, setFbLoading] = useState(USE_FB);
  const [fbStatus,  setFbStatus]  = useState(USE_FB ? "connecting" : "local");

  // ── On mount: load latest data from Firebase (overrides localStorage cache) ──
  useEffect(() => {
    if (!USE_FB) return;
    loadAllFromFirebase().then(result => {
      if (result) {
        if (result.users)     { onUsersChange(result.users); lsSave(LS_KEYS.users, result.users); }
        if (result.years)     { setYears(result.years); lsSave(LS_KEYS.years, result.years); }
        if (result.yearStore) {
          const cleanedStore = cleanYearStore(result.yearStore);
          setYearStore(cleanedStore);
          lsSave(LS_KEYS.yearStore, cleanedStore);
          // Write cleaned data back to Firebase to permanently remove stale depts
          Object.entries(cleanedStore).forEach(([year, data]) => {
            saveYearData(Number(year), data);
          });
          // Switch to latest year
          const latestYear = Math.max(...result.years);
          setActiveYear(latestYear);
        }
        setFbStatus("connected");
      } else {
        setFbStatus(USE_FB ? "connected_empty" : "local");
      }
      setFbLoading(false);
    }).catch(() => { setFbStatus("error"); setFbLoading(false); });
  }, []);

  // ── Persist years list on change ──
  useEffect(() => { saveYears(years); }, [years]);

  // ── Persist individual year data whenever yearStore changes ──
  const prevYearStore = useRef({});
  useEffect(() => {
    Object.entries(yearStore).forEach(([year, data]) => {
      const prev = prevYearStore.current[year];
      if (JSON.stringify(prev) !== JSON.stringify(data)) {
        saveYearData(Number(year), data);
      }
    });
    prevYearStore.current = yearStore;
  }, [yearStore]);

  // ── Derived year data ──
  const rows     = (yearStore[activeYear]||{}).rows     || [];
  const qStatus  = (yearStore[activeYear]||{}).qStatus  || {};
  const schedule = (yearStore[activeYear]||{}).schedule || mkInitSchedule(activeYear);
  const issues   = (yearStore[activeYear]||{}).issues   || [];

  const setRows     = updater => setYearStore(s=>({...s,[activeYear]:{...s[activeYear],rows:typeof updater==="function"?updater((s[activeYear]||{}).rows||[]):updater}}));
  const setQStatus  = updater => setYearStore(s=>({...s,[activeYear]:{...s[activeYear],qStatus:typeof updater==="function"?updater((s[activeYear]||{}).qStatus||{}):updater}}));
  const setSchedule = updater => setYearStore(s=>({...s,[activeYear]:{...s[activeYear],schedule:typeof updater==="function"?updater((s[activeYear]||{}).schedule||mkInitSchedule(activeYear)):updater}}));
  const setIssues   = updater => setYearStore(s=>({...s,[activeYear]:{...s[activeYear],issues:typeof updater==="function"?updater((s[activeYear]||{}).issues||[]):updater}}));

  const [view,         setView]         = useState("dashboard");
  const [showAdd,      setShowAdd]      = useState(false);
  const [detailRow,    setDetailRow]    = useState(null);
  const [showTemplate, setShowTemplate] = useState(false);
  const [showImport,   setShowImport]   = useState(false);
  const [previewData,  setPreviewData]  = useState(null);
  const [toast,        setToast]        = useState(null);
  const [insights,     setInsights]     = useState(null);
  const [loadingAI,    setLoadingAI]    = useState(false);
  const [filterType,   setFilterType]   = useState("ALL");
  const [selDept,      setSelDept]      = useState(null);
  const [statusFilter, setStatusFilter] = useState(null);
  const [selectedIds,  setSelectedIds]  = useState(new Set());
  const PAGE_SIZE = 15;
  const [trackerPage,  setTrackerPage]  = useState(1);
  const [rankPage,     setRankPage]     = useState(1);
  const [qEditCell,    setQEditCell]    = useState(null);
  const [editSched,    setEditSched]    = useState(null);
  const [showIssueForm,setShowIssueForm]= useState(false);
  const [editIssue,    setEditIssue]    = useState(null);
  const [showYearMenu, setShowYearMenu] = useState(false);
  const yearMenuRef = useRef(null);

  const toast$ = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),4000); };

  const switchYear = (y) => {
    setActiveYear(y);
    setView("dashboard");
    setFilterType("ALL"); setSelDept(null); setStatusFilter(null);
    setSelectedIds(new Set()); setInsights(null);
    setDetailRow(null); setQEditCell(null); setEditSched(null);
    setYearStore(s => s[y] ? s : {...s, [y]: mkEmptyYearData(y)});
  };

  const addYear = () => {
    const maxYear = Math.max(...years);
    const newYear = maxYear + 1;
    const newYears = [...years, newYear].sort((a,b)=>a-b);
    setYears(newYears);
    setYearStore(s => ({...s, [newYear]: mkEmptyYearData(newYear)}));
    setShowYearMenu(false);
    switchYear(newYear);
    toast$(`FY ${newYear} created — add your KRs to get started.`);
  };

  const deleteYear = (y) => {
    const yData = yearStore[y];
    const hasRows = ((yData||{}).rows || []).length > 0;
    const hasIssues = ((yData||{}).issues || []).length > 0;
    if (hasRows || hasIssues) { toast$(`FY ${y} has data — clear all KRs and issues first before deleting.`,"warn"); return; }
    if (years.length <= 1) { toast$("Cannot delete the only remaining year.","warn"); return; }
    const remaining = years.filter(yr => yr !== y).sort((a,b)=>a-b);
    setYears(remaining);
    setYearStore(s => { const next = {...s}; delete next[y]; return next; });
    if (activeYear === y) switchYear(remaining[remaining.length - 1]);
    setShowYearMenu(false);
    toast$(`FY ${y} deleted.`,"warn");
  };

  const historyData = useMemo(() => years.map(y => {
    const yRows = (yearStore[y]||{}).rows || [];
    const totW = yRows.reduce((s,r)=>s+r.weight,0);
    const totS = yRows.reduce((s,r)=>s+r.scoreEquivalent,0);
    const pct  = totW > 0 ? (totS/totW)*100 : 0;
    const deptMap = {};
    yRows.forEach(r=>{ const d=r.department; if(!deptMap[d])deptMap[d]={w:0,s:0,chief:r.chiefGroup||getChief(r.department)}; deptMap[d].w+=r.weight; deptMap[d].s+=r.scoreEquivalent; });
    const depts = Object.entries(deptMap).map(([name,d])=>({name,chief:d.chief,pct:d.w>0?(d.s/d.w)*100:0})).sort((a,b)=>b.pct-a.pct);
    return { year:y, pct, krs:yRows.length, depts, onTrack:yRows.filter(r=>r.pct>=80).length, atRisk:yRows.filter(r=>r.pct>=60&&r.pct<80).length, offTrack:yRows.filter(r=>r.pct<60).length };
  }), [yearStore, years]);

  const allDepts = useMemo(()=>[...new Set(rows.map(r=>r.department))].sort(),[rows]);
  const colorMap = useMemo(()=>{ const m={}; allDepts.forEach((d,i)=>m[d]=PALETTE[i%PALETTE.length]); return m; },[allDepts]);

  const deptStats = useMemo(()=>{
    const map={};
    rows.forEach(r=>{ if(!map[r.department]) map[r.department]={krs:[],w:0,s:0,chief:r.chiefGroup||getChief(r.department)}; map[r.department].krs.push(r); map[r.department].w+=r.weight; map[r.department].s+=r.scoreEquivalent; });
    return Object.entries(map).map(([name,d])=>({ name,krs:d.krs,weight:d.w,score:d.s,chief:d.chief||"Other",pct:d.w>0?(d.s/d.w)*100:0,onTrack:d.krs.filter(k=>k.pct>=80).length,atRisk:d.krs.filter(k=>k.pct>=60&&k.pct<80).length,offTrack:d.krs.filter(k=>k.pct<60).length })).sort((a,b)=>b.pct-a.pct);
  },[rows]);

  const chiefStats = useMemo(()=>{
    const map={};
    rows.forEach(r=>{ const chief=r.chiefGroup||getChief(r.department); if(!map[chief]) map[chief]={depts:new Set(),krs:[],w:0,s:0}; map[chief].depts.add(r.department); map[chief].krs.push(r); map[chief].w+=r.weight; map[chief].s+=r.scoreEquivalent; });
    return Object.entries(map).map(([name,d])=>({ name,depts:[...d.depts],krs:d.krs,weight:d.w,score:d.s,pct:d.w>0?(d.s/d.w)*100:0,onTrack:d.krs.filter(k=>k.pct>=80).length,atRisk:d.krs.filter(k=>k.pct>=60&&k.pct<80).length,offTrack:d.krs.filter(k=>k.pct<60).length,color:CHIEF_COLORS[name]||C.muted })).sort((a,b)=>b.pct-a.pct);
  },[rows]);

  const totW=useMemo(()=>rows.reduce((s,r)=>s+r.weight,0),[rows]);
  const totS=useMemo(()=>rows.reduce((s,r)=>s+r.scoreEquivalent,0),[rows]);
  const ovPct=totW>0?(totS/totW)*100:0;

  const visibleRows=useMemo(()=>{
    setTrackerPage(1);
    setRankPage(1);
    let base = rows;
    if(filterType!=="ALL"){ if(CHIEF_NAMES.includes(filterType)){ if(selDept) base=rows.filter(r=>r.department===selDept); else base=rows.filter(r=>(r.chiefGroup||getChief(r.department))===filterType); } }
    if(statusFilter==="on-track") base=base.filter(r=>r.pct>=80);
    else if(statusFilter==="at-risk") base=base.filter(r=>r.pct>=60&&r.pct<80);
    else if(statusFilter==="off-track") base=base.filter(r=>r.pct<60);
    return base;
  },[rows,filterType,selDept,statusFilter]);

  const visW=visibleRows.reduce((s,r)=>s+r.weight,0);
  const visS=visibleRows.reduce((s,r)=>s+r.scoreEquivalent,0);
  const visPct=visW>0?(visS/visW)*100:0;

  const handleAdd = form => { const nr=compute({id:uid(),chiefGroup:form.chiefGroup,department:form.department,keyResult:form.keyResult,weight:+form.weight,targetDate:form.targetDate,target:+form.target,actual:+form.actual}); setRows(p=>[...p,nr]); setShowAdd(false); toast$("KR added."); };
  const handleUpdate = (form,editId) => { const nr=compute({id:editId,chiefGroup:form.chiefGroup,department:form.department,keyResult:form.keyResult,weight:+form.weight,targetDate:form.targetDate,target:+form.target,actual:+form.actual}); setRows(p=>p.map(r=>r.id===editId?nr:r)); setDetailRow(null); toast$("KR updated."); };
  const handleDelete = id => { setRows(p=>p.filter(r=>r.id!==id)); setDetailRow(null); toast$("KR deleted.","warn"); };
  const handleBulkDelete = () => { const n=selectedIds.size; setRows(p=>p.filter(r=>!selectedIds.has(r.id))); setSelectedIds(new Set()); toast$(`${n} KR${n!==1?"s":""} deleted.`,"warn"); };
  const handleParsed = (parsedRows,errors) => { setShowImport(false); setPreviewData({rows:parsedRows,errors}); };

  const handleImportConfirm = () => {
    if (!previewData) return;
    const ekmap = {}; rows.forEach(r => { ekmap[mkey(r)] = r.id; });
    let upd=0, add=0; const next=[...rows];
    previewData.rows.forEach(imp => {
      const k=mkey(imp), existingId=ekmap[k];
      if (existingId !== undefined) { const idx=next.findIndex(r=>r.id===existingId); if(idx>-1){next[idx]=compute({...next[idx],chiefGroup:imp.chiefGroup||next[idx].chiefGroup,targetDate:imp.targetDate||next[idx].targetDate,weight:imp.weight,target:imp.target,actual:imp.actual});upd++;} }
      else { next.push(compute({...imp,id:uid()})); add++; }
    });
    setRows(next); setPreviewData(null); toast$(`Import complete — ${upd} updated, ${add} added. Total: ${next.length} KRs.`);
  };

  const loadAI=useCallback(()=>{
    if(!rows.length) return;
    setLoadingAI(true); setInsights(null);
    getInsights(rows)
      .then(function(result){ setInsights(result); setLoadingAI(false); })
      .catch(function(e){ setInsights({error:"Could not load AI insights. Add your API key or check the console. "+e.message}); setLoadingAI(false); });
  },[rows]);

  const exportPDF = useCallback(() => {
    const sc2  = p => p>=80?"#16a34a":p>=60?"#d97706":"#dc2626";
    const slbl = p => p>=80?"On Track":p>=60?"At Risk":"Off Track";
    const sbg  = p => p>=80?"#f0fdf4":p>=60?"#fffbeb":"#fef2f2";
    const esc  = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const totW2 = rows.reduce((s,r)=>s+r.weight,0);
    const totS2 = rows.reduce((s,r)=>s+r.scoreEquivalent,0);
    const ovPct2 = totW2>0?(totS2/totW2)*100:0;
    const deptMap2 = {};
    rows.forEach(r=>{ const d=r.department; if(!deptMap2[d]) deptMap2[d]={chief:r.chiefGroup||getChief(r.department),w:0,s:0,krs:[]}; deptMap2[d].w+=r.weight; deptMap2[d].s+=r.scoreEquivalent; deptMap2[d].krs.push(r); });
    const deptList2 = Object.entries(deptMap2).map(([name,d])=>({ name, chief:d.chief, pct:d.w>0?(d.s/d.w)*100:0, krs:d.krs.length, onTrack:d.krs.filter(r=>r.pct>=80).length, atRisk:d.krs.filter(r=>r.pct>=60&&r.pct<80).length, offTrack:d.krs.filter(r=>r.pct<60).length })).sort((a,b)=>b.pct-a.pct);
    const chiefMap2 = {};
    rows.forEach(r=>{ const c=r.chiefGroup||getChief(r.department); if(!chiefMap2[c]) chiefMap2[c]={depts:new Set(),w:0,s:0,krs:[]}; chiefMap2[c].depts.add(r.department); chiefMap2[c].w+=r.weight; chiefMap2[c].s+=r.scoreEquivalent; chiefMap2[c].krs.push(r); });
    const chiefList2 = Object.entries(chiefMap2).map(([name,d])=>({ name, depts:d.depts.size, pct:d.w>0?(d.s/d.w)*100:0, krs:d.krs.length, onTrack:d.krs.filter(r=>r.pct>=80).length, atRisk:d.krs.filter(r=>r.pct>=60&&r.pct<80).length, offTrack:d.krs.filter(r=>r.pct<60).length })).sort((a,b)=>b.pct-a.pct);
    const bar = (pct,w=120) => { const fill=sc2(pct), p=Math.min(Math.max(pct,0),100); return `<div style="display:flex;align-items:center;gap:6px"><div style="width:${w}px;height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden"><div style="width:${p}%;height:100%;background:${fill};border-radius:99px"></div></div><span style="font-size:10px;color:${fill};font-weight:700">${pct.toFixed(1)}%</span></div>`; };
    const sortedRows = [...rows].sort((a,b)=>{ const ca=a.chiefGroup||getChief(a.department), cb=b.chiefGroup||getChief(b.department); return ca.localeCompare(cb)||a.department.localeCompare(b.department)||b.pct-a.pct; });
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Chiefs Group OKR Report FY ${activeYear}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#0f172a;font-size:11px}.cover{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:48px;}.cover-title{font-size:32px;font-weight:900;letter-spacing:2px;}.kpi-grid{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}.kpi-card{flex:1;min-width:110px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:10px;padding:14px;border-top-width:3px}.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;font-weight:700;margin-bottom:4px}.kpi-value{font-size:28px;font-weight:900}.section{padding:24px 32px}table{width:100%;border-collapse:collapse;margin-bottom:16px}thead tr{background:#1e293b}thead th{padding:7px 10px;text-align:left;color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:1px;font-weight:700}tbody tr:nth-child(even){background:#f8fafc}td{padding:6px 10px;border-bottom:1px solid #f1f5f9}.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:700}.print-bar{position:fixed;bottom:20px;right:20px}@media print{.print-bar{display:none}@page{margin:1cm;size:A4 landscape}}</style></head><body>
    <div class="print-bar"><button onclick="window.print()" style="padding:11px 22px;border-radius:10px;border:none;background:#1e40af;color:#fff;cursor:pointer;font-weight:700">🖨 Print / Save PDF</button></div>
    <div class="cover"><div style="font-size:11px;opacity:.5;letter-spacing:3px;margin-bottom:8px">CHIEFS GROUP</div><div class="cover-title">OKR Full Report · FY ${activeYear}</div><div style="font-size:52px;font-weight:900;color:${sc2(ovPct2)};margin:12px 0 4px">${ovPct2.toFixed(1)}%</div><div style="font-size:12px;color:${sc2(ovPct2)};font-weight:700">${slbl(ovPct2)} · Combined OKR Score</div><div style="margin-top:12px;font-size:11px;opacity:.6">Generated ${new Date().toLocaleString()} · ${rows.length} KRs · ${deptList2.length} Departments</div></div>
    <div class="section"><h2 style="margin-bottom:14px">Chief Group Performance</h2><table><thead><tr><th>#</th><th>Chief Group</th><th>Depts</th><th>KRs</th><th>On Track</th><th>At Risk</th><th>Off Track</th><th>Score</th><th>Status</th></tr></thead><tbody>${chiefList2.map((c,i)=>`<tr><td>${i+1}</td><td><b>${esc(c.name)}</b></td><td>${c.depts}</td><td>${c.krs}</td><td style="color:#16a34a;font-weight:700">${c.onTrack}</td><td style="color:#d97706;font-weight:700">${c.atRisk}</td><td style="color:#dc2626;font-weight:700">${c.offTrack}</td><td>${bar(c.pct,100)}</td><td><span class="badge" style="background:${sbg(c.pct)};color:${sc2(c.pct)}">${slbl(c.pct)}</span></td></tr>`).join("")}</tbody></table>
    <h2 style="margin:20px 0 14px">All Key Results</h2><table><thead><tr><th>#</th><th>Chief</th><th>Department</th><th>Key Result</th><th>Target Date</th><th>Target</th><th>Actual</th><th>% Done</th><th>Status</th></tr></thead><tbody>${sortedRows.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.chiefGroup||getChief(r.department))}</td><td><b>${esc(r.department)}</b></td><td>${esc(r.keyResult)}</td><td>${esc(r.targetDate||"—")}</td><td>${Number(r.target).toLocaleString()}</td><td><b>${Number(r.actual).toLocaleString()}</b></td><td style="color:${sc2(r.pct)};font-weight:700">${r.pct}%</td><td><span class="badge" style="background:${sbg(r.pct)};color:${sc2(r.pct)}">${slbl(r.pct)}</span></td></tr>`).join("")}</tbody></table></div></body></html>`;
    const blob = new Blob([html], { type: "text/html;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `OKR_Report_FY${activeYear}_${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    toast$("Report downloaded — open the file and click Print / Save as PDF.");
  }, [rows, issues, activeYear]);

  useEffect(()=>{ if(view==="dashboard" && rows.length > 0) loadAI(); },[view]);
  useEffect(()=>{
    if(!showYearMenu) return;

  const saveIssue = (form,id) => { const rec={...form,id:id||uid(),createdAt:id?undefined:new Date().toLocaleDateString()}; if(id) setIssues(p=>p.map(i=>i.id===id?rec:i)); else setIssues(p=>[...p,rec]); setShowIssueForm(false); setEditIssue(null); toast$(id?"Issue updated.":"Issue logged."); };

        @keyframes spin{to{transform:rotate(360deg)}}

        .kr-row:hover{background:${C.accent}0a!important;cursor:pointer}
        .dsk{display:block}.mob{display:none}

          .nav-btn-text{display:none!important}

          .main-pad{padding:12px 8px!important}
          .score-tiles{grid-template-columns:1fr 1fr!important}
          .tracker-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
          .filter-pills{flex-wrap:nowrap!important;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
          .summary-bar{flex-wrap:wrap;gap:8px!important}
          .q-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
          .tracker-toolbar{flex-wrap:wrap;gap:6px!important}
        }
      `}</style>

      <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",paddingBottom:60}}>

        {/* Firebase loading overlay */}
        {fbLoading&&<div style={{position:"fixed",inset:0,background:"#0a0c14f0",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{width:48,height:48,border:"3px solid #1e2640",borderTopColor:"#4f8ef7",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
          <div style={{fontSize:16,fontWeight:700,color:"#e8eaf2"}}>Loading from Firebase…</div>
          <div style={{fontSize:12,color:"#6b7399"}}>Syncing your OKR data</div>
        </div>}

        {toast&&<div style={{position:"fixed",top:14,right:14,zIndex:999,background:C.card,border:`1px solid ${toast.type==="success"?C.green:toast.type==="warn"?C.amber:C.red}66`,borderRadius:12,padding:"12px 18px",fontSize:13,fontWeight:600,color:toast.type==="success"?C.green:toast.type==="warn"?C.amber:C.red,maxWidth:340,animation:"fadeUp .3s ease",boxShadow:"0 8px 32px #000a"}}>{toast.msg}</div>}

            <div style={{width:1,height:20,background:C.border,flexShrink:0}}/>

                <div style={{fontSize:11,fontWeight:700,color:C.text}}>{(authUser||{}).name||"Guest"}</div>

          </div>

            <div style={{display:"flex",flexDirection:"column",gap:24}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <h1 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:800}}>Overall KR Status</h1>
                    <span style={{padding:"3px 12px",borderRadius:99,background:`${C.gold}22`,border:`1px solid ${C.gold}55`,color:C.gold,fontWeight:800,fontSize:13}}>FY {activeYear}</span>

                  <p style={{fontSize:12,color:C.muted,marginTop:3}}>{rows.length} KRs · {allDepts.length} departments</p>

                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

                    <div key={l} onClick={()=>{ if(sf){ setFilterType("ALL"); setSelDept(null); setStatusFilter(sf); setView("tracker"); } }}

                      onMouseEnter={e=>{ if(sf){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${col}33`;}}}
                      onMouseLeave={e=>{ if(sf){e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}}>

                      <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>{l}</div>
                      <div style={{fontSize:"clamp(24px,5vw,32px)",fontWeight:800,color:col,fontFamily:"'Bebas Neue'",lineHeight:1.1}}>{v}</div>
                      <div style={{fontSize:11,color:C.muted}}>{s}{sf&&<span style={{fontSize:9,color:col,marginLeft:6,fontWeight:700}}>→ View</span>}</div>
                    </div>

              {rows.length > 0 && (
                <>
                  {/* Department Rankings */}
                  {(()=>{
                    const RANK_PAGE_SIZE = 10;
                    const totalRankPages = Math.ceil(deptStats.length / RANK_PAGE_SIZE);
                    const safeRankPage = Math.min(rankPage, Math.max(1, totalRankPages));

                    return (
                      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>

                            const val=row[q]||"", col=ssColor(val), bg=ssBg(val);
                            const isEd=(qEditCell||{}).dept===row.dept&&(qEditCell||{}).quarter===q;
                            return (<td key={q} style={{padding:"7px 8px",textAlign:"center",verticalAlign:"middle",borderLeft:`1px solid ${C.border}22`}}>
                              {isEd?(<select autoFocus value={val} onChange={e=>{updateQStatus(row.dept,q,e.target.value);}} onBlur={()=>setQEditCell(null)}
                                style={{background:C.surface,border:`1px solid ${C.accent}`,borderRadius:6,color:C.text,fontSize:10,padding:"2px 4px",outline:"none"}}>
                                <option value="">— Pending</option>
                                {["Updated","Ongoing Update","No Update"].map(s=><option key={s} value={s}>{s}</option>)}
                              </select>)
                              :(<div onClick={()=>setQEditCell({dept:row.dept,quarter:q,field:"status"})} style={{display:"inline-flex",alignItems:"center",padding:"3px 8px",borderRadius:99,background:val?bg:`${C.border}18`,color:val?col:C.muted,fontSize:10,fontWeight:700,border:`1px solid ${val?col+"44":C.border}`,cursor:"pointer",whiteSpace:"nowrap",minWidth:80}}>{val||"— Pending"}</div>)}
                            </td>);
                          })}
                        </tr>);
                      })
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ══════════════════ ISSUES ══════════════════ */}
          {view==="issues"&&(
            <div>
              <div style={{marginBottom:14}}>
                <h1 style={{fontSize:"clamp(18px,5vw,22px)",fontWeight:800}}>Issues & Dependencies Tracker</h1>
                <p style={{fontSize:12,color:C.muted,marginTop:3}}>{issues.length} issue{issues.length!==1?"s":""} logged for FY {activeYear}</p>
              </div>
              {issues.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
                  {ISSUE_STATUS_LIST.map(s=>{const n=issues.filter(i=>i.status===s).length,col=isColor(s);return(<div key={s} style={{background:C.card,border:`1px solid ${col}33`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>{s}</div><div style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",color:col}}>{n}</div></div>);})}
                </div>
              )}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>{setEditIssue(null);setShowIssueForm(true);}} style={{padding:"9px 16px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,boxShadow:`0 2px 10px ${C.accent}44`}}>⚑ Log New Issue</button>
                {issues.length>0&&<span style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>Open <b style={{color:C.red}}>{issues.filter(i=>i.status==="Open").length}</b> · In Progress <b style={{color:C.amber}}>{issues.filter(i=>i.status==="In Progress").length}</b> · Resolved <b style={{color:C.green}}>{issues.filter(i=>i.status==="Resolved"||i.status==="Closed").length}</b></span>}
              </div>
              {issues.length===0?(
                <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:12,padding:"40px 24px",textAlign:"center"}}>
                  <div style={{fontSize:38,marginBottom:10}}>📝</div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>No issues logged yet</div>
                  <div style={{fontSize:12,color:C.muted}}>Click <b style={{color:C.accent}}>⚑ Log New Issue</b> to start tracking</div>
                </div>
              ):(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
                    <thead><tr style={{background:C.surface}}>{["#","Type","Issue / Description","Raised By","Assigned To","Status","Target Closure","Remarks",""].map(h=>(<th key={h} style={{padding:"9px 10px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
                    <tbody>
                      {issues.map((issue,idx)=>{
                        const ic=isColor(issue.status);
                        return (
                          <tr key={issue.id} style={{borderBottom:idx<issues.length-1?`1px solid ${C.border}`:"none",background:idx%2===0?"transparent":`${C.surface}44`}}>
                            <td style={{padding:"9px 10px",fontSize:11,color:C.muted,fontWeight:700,whiteSpace:"nowrap"}}>#{String(idx+1).padStart(3,"0")}</td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:`${C.purple}18`,color:C.purple,border:`1px solid ${C.purple}33`,fontWeight:700}}>{issue.type||"—"}</span></td>
                            <td style={{padding:"9px 10px",maxWidth:240}}><div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={issue.description}>{issue.description}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>Raised: {issue.createdAt||"—"}</div></td>
                            <td style={{padding:"9px 8px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{issue.raisedBy||"—"}</td>
                            <td style={{padding:"9px 8px",maxWidth:200}}><div style={{display:"flex",flexWrap:"wrap",gap:3}}>{(issue.assignedTo||[]).map(d=>(<span key={d} style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:`${C.accent}18`,color:C.accent,border:`1px solid ${C.accent}33`,fontWeight:600,whiteSpace:"nowrap"}}>{d}</span>))}{(!issue.assignedTo||issue.assignedTo.length===0)&&<span style={{fontSize:11,color:C.muted}}>—</span>}</div></td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:99,fontSize:10,fontWeight:700,background:isBg(issue.status),color:ic,border:`1px solid ${ic}44`}}>{issue.status||"Open"}</span></td>
                            <td style={{padding:"9px 8px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{issue.targetClosure||"—"}</td>
                            <td style={{padding:"9px 10px",maxWidth:180}}><div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={issue.remarks}>{issue.remarks||"—"}</div></td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:4}}><button onClick={()=>{setEditIssue(issue);setShowIssueForm(true);}} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11,padding:"3px 7px",borderRadius:6}}>✎</button><button onClick={()=>deleteIssue(issue.id)} style={{background:"none",border:`1px solid ${C.red}33`,color:C.red,cursor:"pointer",fontSize:11,padding:"3px 7px",borderRadius:6}}>✕</button></div></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {/* ══════════════════ HISTORY ══════════════════ */}
          {view==="history"&&(
            <div>
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:800}}>Multi-Year OKR History</h1>
                <p style={{fontSize:12,color:C.muted,marginTop:3}}>Year-over-year performance · click any year to open its dashboard</p>
              </div>
              {years.length === 1 && rows.length === 0 ? (
                <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:12,padding:"40px 24px",textAlign:"center"}}>
                  <div style={{fontSize:38,marginBottom:10}}>📈</div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>No historical data yet</div>
                  <div style={{fontSize:12,color:C.muted}}>Add KRs to FY {activeYear} and use the year picker to add future years.</div>
                </div>
              ) : (
                <>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:"24px",marginBottom:20}}>
                    <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:20,fontWeight:700}}>Combined OKR Score — Year over Year</div>
                    <div style={{display:"flex",gap:20,alignItems:"flex-end",height:200,paddingBottom:8}}>
                      {historyData.map((yd,i)=>{
                        const col=sc(yd.pct), isCurrent=yd.year===activeYear;
                        const prev=i>0?historyData[i-1].pct:null;
                        const delta=prev!==null?yd.pct-prev:null;
                        return (<div key={yd.year} onClick={()=>switchYear(yd.year)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"}}>
                          <div style={{fontSize:11,fontWeight:700,color:delta===null?C.muted:delta>=0?C.green:C.red,marginBottom:6,height:18}}>{delta!==null&&(delta>=0?"▲ ":"▼ ")+Math.abs(delta).toFixed(1)+"%"}</div>
                          <div style={{width:"100%",flex:1,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                            <div style={{width:"80%",height:yd.pct>0?`${Math.max(yd.pct,4)}%`:"4%",background:yd.pct>0?`linear-gradient(180deg,${col}55,${col})`:`${C.border}`,borderRadius:"8px 8px 0 0",border:`2px solid ${yd.pct>0?col+"44":C.border}`,position:"relative"}}>
                              {yd.pct>0&&<div style={{position:"absolute",top:-26,left:"50%",transform:"translateX(-50%)",fontSize:15,fontWeight:800,fontFamily:"'Bebas Neue'",color:col,whiteSpace:"nowrap"}}>{yd.pct.toFixed(1)}%</div>}
                            </div>
                          </div>
                          <div style={{marginTop:8,textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,fontFamily:"'Bebas Neue'",color:isCurrent?C.gold:C.text}}>{yd.year}</div>
                            <div style={{fontSize:10,color:C.muted}}>{yd.krs} KRs</div>
                          </div>
                        </div>);
                      })}
                    </div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
                    <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:13,fontWeight:800}}>Year-over-Year Summary</div></div>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr style={{background:C.surface}}>{["Fiscal Year","Score","Status","On Track","At Risk","Off Track","KRs","YoY Change",""].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {[...historyData].reverse().map((yd,i,arr)=>{
                          const prev=arr[i+1], delta=prev?yd.pct-prev.pct:null, isCurrent=yd.year===activeYear;
                          return (<tr key={yd.year} onClick={()=>switchYear(yd.year)} style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:isCurrent?`${C.gold}08`:"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}0a`} onMouseLeave={e=>e.currentTarget.style.background=isCurrent?`${C.gold}08`:"transparent"}>
                            <td style={{padding:"12px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17,fontWeight:800,fontFamily:"'Bebas Neue'",color:isCurrent?C.gold:C.text}}>FY {yd.year}</span>{isCurrent&&<span style={{fontSize:9,padding:"1px 7px",borderRadius:99,background:`${C.gold}22`,color:C.gold,fontWeight:700,border:`1px solid ${C.gold}44`}}>ACTIVE</span>}</div></td>
                            <td style={{padding:"12px 14px"}}><span style={{fontSize:22,fontWeight:800,fontFamily:"'Bebas Neue'",color:yd.krs>0?sc(yd.pct):C.muted}}>{yd.krs>0?yd.pct.toFixed(1)+"%":"—"}</span></td>
                            <td style={{padding:"12px 14px"}}>{yd.krs>0?<Badge score={yd.pct}/>:<span style={{fontSize:11,color:C.muted}}>No data</span>}</td>
                            <td style={{padding:"12px 14px",fontWeight:700,color:C.green,fontSize:14}}>{yd.onTrack}</td>
                            <td style={{padding:"12px 14px",fontWeight:700,color:C.amber,fontSize:14}}>{yd.atRisk}</td>
                            <td style={{padding:"12px 14px",fontWeight:700,color:C.red,fontSize:14}}>{yd.offTrack}</td>
                            <td style={{padding:"12px 14px",fontSize:12,color:C.muted}}>{yd.krs}</td>
                            <td style={{padding:"12px 14px"}}>{delta!==null&&yd.krs>0?<span style={{fontWeight:700,color:delta>=0?C.green:C.red,fontSize:13}}>{delta>=0?"▲":"▼"} {Math.abs(delta).toFixed(1)}%</span>:<span style={{color:C.muted,fontSize:12}}>—</span>}</td>
                            <td style={{padding:"12px 14px",fontSize:11,color:C.accent,fontWeight:600}}>Open →</td>
                          </tr>);
                        })}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
            </div>
          )}

        </div>
      </div>

      {showIssueForm&&<IssueFormModal issue={editIssue} deptList={ALL_DEPTS_LIST} onClose={()=>{setShowIssueForm(false);setEditIssue(null);}} onSave={saveIssue}/>}
      {showImport&&<ImportModal onParsed={handleParsed} onClose={()=>setShowImport(false)}/>}
      {previewData&&<PreviewModal preview={previewData.rows} existing={rows} errors={previewData.errors} onClose={()=>setPreviewData(null)} onConfirm={handleImportConfirm}/>}
      {showAdd&&<AddKRModal onClose={()=>setShowAdd(false)} onSave={handleAdd}/>}
      {detailRow&&<KRDetailModal row={detailRow} onClose={()=>setDetailRow(null)} onSave={handleUpdate} onDelete={handleDelete} readOnly={isReadOnly}/>}
      {showTemplate&&<TemplateModal onClose={()=>setShowTemplate(false)}/>}
      {showUserMgmt&&<UserMgmtModal users={users} onClose={()=>setShowUserMgmt(false)} onSave={list=>{onUsersChange(list);setShowUserMgmt(false);toast$("Users saved.");}}/>}
    </>
  );
}

const { useState, useEffect, useMemo, useCallback, useRef } = React;
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AuthGate));

  </script>
</body>
</html>
