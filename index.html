const ROLE_COLORS = { admin:"#f0b429", editor:"#4f8ef7", viewer:"#22d3a5" };

function UserMgmtModal({ users, onClose, onSave }) {
  const [list, setList] = useState(users.map(u=>({...u})));
  const [form, setForm] = useState({ username:"", password:"", name:"", role:"editor" });
  const [err,  setErr]  = useState("");
  const [editId, setEditId] = useState(null);
  const [editPw, setEditPw] = useState({});

  const addUser = () => {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) { setErr("All fields are required."); return; }
    if (list.some(u=>u.username.toLowerCase()===form.username.toLowerCase())) { setErr("Username already exists."); return; }
    const newUser = { id:"u"+Date.now(), username:form.username.trim(), password:form.password.trim(), name:form.name.trim(), role:form.role };
    setList(p=>[...p, newUser]);
    setForm({ username:"", password:"", name:"", role:"editor" });
    setErr("");
  };

  const deleteUser = (id) => {
    if (list.filter(u=>u.role==="admin").length === 1 && (list.find(u=>u.id===id)||{}).role==="admin") { setErr("Cannot delete the only admin."); return; }
    setList(p=>p.filter(u=>u.id!==id));
  };

  const savePassword = (id) => {
    const pw = (editPw[id] ? editPw[id].trim() : "");
    if (!pw) return;
    setList(p=>p.map(u=>u.id===id?{...u,password:pw}:u));
    setEditPw(p=>({...p,[id]:""}));
    setEditId(null);
  };

function AuthGate() {

  const [users,    setUsers]    = useState(INITIAL_USERS);
  const [authUser, setAuthUser] = useState(null);
  const [screen,   setScreen]   = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error,    setError]    = useState("");
  const [loading,  setLoading]  = useState(false);

  const login = () => {
    setError("");
    if (!username.trim() || !password.trim()) { setError("Enter username and password."); return; }
    setLoading(true);
    setTimeout(() => {
      const user = users.find(u => u.username.toLowerCase() === username.trim().toLowerCase() && u.password === password.trim());
      if (user) {
        setAuthUser({ id:user.id, username:user.username, role:user.role, name:user.name });
        setScreen("app");
      } else {
        setError("Incorrect username or password.");
        setPassword("");
      }
      setLoading(false);
    }, 400);
  };

  const enterAsViewer = () => {
    setAuthUser({ id:"viewer", username:"guest", role:"viewer", name:"Guest Viewer" });
    setScreen("app");
  };

  const logout = () => {
    setAuthUser(null);
    setScreen("login");
    setUsername(""); setPassword(""); setError("");
  };

  if (screen === "app" && authUser) {
    return <App authUser={authUser} users={users} onUsersChange={setUsers} onLogout={logout}/>;
  }

  return (
    <div style={{minHeight:"100vh",background:C2.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Sans, system-ui, sans-serif",padding:16}}>
      <div style={{background:C2.card,border:`1px solid ${C2.border}`,borderRadius:20,padding:"36px 32px",width:"min(420px,96vw)",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px",boxShadow:`0 8px 24px ${C2.accent}44`}}>◈</div>
          <div style={{fontSize:21,fontWeight:800,color:C2.text,letterSpacing:.5}}>Chiefs Group</div>
          <div style={{fontSize:13,color:C2.muted,marginTop:3}}>OKR Tracker · Sign In</div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,display:"block",marginBottom:5}}>Username</label>
          <input value={username} onChange={e=>{setUsername(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter your username" autoFocus
            style={{width:"100%",background:C2.surface,border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:10}}
            onFocus={e=>e.target.style.borderColor=C2.accent} onBlur={e=>e.target.style.borderColor=error?C2.red:C2.border}/>
          <label style={{fontSize:10,color:C2.muted,textTransform:"uppercase",letterSpacing:1.5,display:"block",marginBottom:5}}>Password</label>
          <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter your password"
            style={{width:"100%",background:C2.surface,border:`1px solid ${error?C2.red:C2.border}`,borderRadius:9,padding:"11px 14px",color:C2.text,fontSize:14,outline:"none",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=C2.accent} onBlur={e=>e.target.style.borderColor=error?C2.red:C2.border}/>
        </div>

        {error&&<div style={{fontSize:12,color:C2.red,marginBottom:12,textAlign:"center",background:`${C2.red}12`,padding:"8px 12px",borderRadius:7}}>{error}</div>}

        <button onClick={login} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C2.accent},${C2.purple})`,color:"#fff",cursor:loading?"not-allowed":"pointer",fontWeight:700,fontSize:15,marginBottom:12,opacity:loading ? 0.7:1,boxShadow:`0 4px 16px ${C2.accent}44`}}>
          {loading?"Signing in…":"Sign In →"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:1,background:C2.border}}/>
          <span style={{fontSize:11,color:C2.muted}}>or</span>
          <div style={{flex:1,height:1,background:C2.border}}/>
        </div>
        <button onClick={enterAsViewer} style={{width:"100%",padding:"11px",borderRadius:10,border:`1px solid ${C2.green}55`,background:`${C2.green}12`,color:C2.green,cursor:"pointer",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span style={{fontSize:16}}>👁</span> Continue as Viewer
        </button>

        <div style={{marginTop:16,textAlign:"center",fontSize:11,color:`${C2.muted}88`}}>
          Contact your administrator for login credentials
        </div>
      </div>
    </div>
  );

function parseCSV(rawText) {
  let text = rawText.replace(/^\uFEFF/, "");
  const allRows = parseCSVRows(text);
  if (allRows.length < 2) return { rows:[], errors:["File has no data rows."] };
  const ALIAS = {
    "key result":"keyresult","key_result":"keyresult","kr":"keyresult","key results":"keyresult","keyresults":"keyresult",
    "weight (%)":"weight","kr weight":"weight","weight(%)":"weight","krweight":"weight","weight%":"weight",
    "actual achievement":"actual","achievement":"actual","actuals":"actual",
    "targets":"target","target value":"target",
    "chief group":"chiefgroup","chief":"chiefgroup","chiefgroup":"chiefgroup","group":"chiefgroup",
    "target date":"targetdate","date":"targetdate","due date":"targetdate",
    "initiative":"initiative","key metric":"keyresult",
  };
  const headerRowIdx = allRows.findIndex(r => r.some(c => c.trim() !== ""));
  if (headerRowIdx === -1) return { rows:[], errors:["No header row found."] };
  const rawHdrs = allRows[headerRowIdx];
  const hdrs = rawHdrs.map(h => {
    const n = h.replace(/"/g,"").trim().toLowerCase();
    return ALIAS[n] !== undefined ? ALIAS[n] : n;
  });
  const NEED = ["department","keyresult","target","actual"];
  const miss = NEED.filter(n => !hdrs.includes(n));
  if (miss.length) return { rows:[], errors:[`Missing required columns: ${miss.join(", ")}.\nDetected headers: ${rawHdrs.join(" | ")}`] };
  const rows = [], errors = [];
  const dataRows = allRows.slice(headerRowIdx + 1);
  dataRows.forEach((cols, i) => {
    if (cols.every(c => c.trim() === "")) return;
    const o = {};
    hdrs.forEach((h, idx) => { o[h] = (cols[idx] !== undefined ? cols[idx] : "").trim(); });
    if (!o.department || !o.keyresult) {
      if (cols.some(c => c.trim() !== "")) errors.push(`Row ${i+2}: missing Department or Key Result — skipped`);
      return;
    }
    const w = o.weight ? parseFloat(o.weight) : 100;
    const t = parseFloat(o.target), a = parseFloat(o.actual);
    if (isNaN(t) || isNaN(a)) { errors.push(`Row ${i+2} [${o.keyresult.slice(0,25)}]: Target/Actual must be numbers — skipped`); return; }
    rows.push({ department: o.department, keyResult: o.keyresult, chiefGroup: o.chiefgroup || getChief(o.department), targetDate: o.targetdate || "", weight: isNaN(w)?100:w, target: t, actual: a });
  });
  return { rows, errors };
}

function parseCSVRows(text) {
  const rows = [];
  let cur = [], field = "", inQuote = false;
  let s = "";
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '\r') { s += '\n'; if (text[i+1] === '\n') i++; } else s += text[i];
  }
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuote) {
      if (ch === '"') { if (i + 1 < s.length && s[i+1] === '"') { field += '"'; i++; } else inQuote = false; }
      else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { cur.push(field.trim()); field = ""; }
      else if (ch === '\n') { cur.push(field.trim()); field = ""; if (cur.some(c => c !== "")) rows.push(cur); cur = []; }
      else field += ch;
    }
  }
  cur.push(field.trim());
  if (cur.some(c => c !== "")) rows.push(cur);
  return rows;
}

    <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:`linear-gradient(90deg,${color}44,${color})`,borderRadius:99,transition:"width .8s ease"}}/>
  </div>
);
const Badge = ({score,small}) => {
  const col=sc(score);
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:small?"2px 7px":"3px 10px",borderRadius:99,fontSize:small?10:11,fontWeight:700,background:`${col}18`,color:col,border:`1px solid ${col}44`,whiteSpace:"nowrap"}}>{si(score)} {sl(score)}</span>;
};

  useEffect(() => {
    try {
      const blob = new Blob([TMPL], { type:"text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      setBlobUrl(url); setStatus("ready");
      return () => URL.revokeObjectURL(url);
    } catch { setStatus("error"); }

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.gold}55`,borderRadius:20,width:"min(520px,96vw)",boxShadow:`0 0 60px ${C.gold}11`,overflow:"hidden"}}>
        <div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{margin:0,fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.text}}>⬇ OKR CSV TEMPLATE</h2>
            <p style={{margin:"4px 0 0",fontSize:12,color:C.muted}}>Download · fill in your data · import</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"5px 11px",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{padding:"24px"}}>
          <div style={{textAlign:"center",marginBottom:22}}>
            {status==="ready"&&blobUrl ? (
              <a href={blobUrl} download="OKR_Template.csv" onClick={()=>setStatus("downloading")}
                style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:10,padding:"15px 32px",borderRadius:12,background:`linear-gradient(135deg,${C.green},${C.accent})`,color:"#fff",fontWeight:800,fontSize:16,textDecoration:"none",boxShadow:`0 4px 20px ${C.green}44`}}>
                ⬇ Download OKR_Template.csv

            ) : status==="downloading" ? (
              <div style={{padding:"15px 32px",borderRadius:12,background:`${C.green}18`,border:`1px solid ${C.green}44`,color:C.green,fontWeight:700,fontSize:15,display:"inline-block"}}>✓ Download started!</div>
            ) : (
              <div style={{padding:"15px 32px",borderRadius:12,background:C.border,color:C.muted,fontSize:14,display:"inline-block"}}>Preparing…</div>
            )}
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:10}}>Columns in the template</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {["Chief Group","Department","Key Result","Target Date","Target","Actual"].map((col,i)=>(
                <span key={col} style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:i<2?`${C.accent}18`:i===2?`${C.green}18`:`${C.gold}18`,color:i<2?C.accent:i===2?C.green:C.gold,border:`1px solid ${i<2?C.accent:i===2?C.green:C.gold}33`}}>{col}</span>
              ))}
            </div>
          </div>
          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}22`,borderRadius:10,padding:"13px 16px",fontSize:12,color:C.muted,lineHeight:2}}>
            <b style={{color:C.accent}}>Steps:</b> Download → Open in Excel/Sheets → Fill data → Save as .csv → Import CSV
          </div>
        </div>
      </div>

const ImportModal = ({onParsed,onClose}) => {
  const [mode, setMode] = useState("file");
  const [pasted, setPasted] = useState("");
  const [drag, setDrag] = useState(false);
  const [err, setErr] = useState("");
  const [rawText, setRawText] = useState("");
  const [fileName, setFileName] = useState("");

  const tryParse = text => {
    setErr("");
    const {rows,errors} = parseCSV(text);
    if (rows.length === 0) { setErr((errors[0]||"No valid rows found.") + (errors.length>1?`\n+${errors.length-1} more issues`:"")); return; }
    onParsed(rows, errors);
  };

  const readFile = file => {
    if (!file) return;
    if (!file.name.match(/\.(csv|txt)$/i)) { setErr("Please select a .csv or .txt file."); return; }
    setErr(""); setFileName(file.name); setRawText("");
    const fr = new FileReader();
    fr.onload = e => setRawText(e.target.result);
    fr.onerror = () => setErr("File read failed. Try the Paste method instead.");
    fr.readAsText(file);
  };

  const onDrop = e => { e.preventDefault(); setDrag(false); readFile(e.dataTransfer.files[0]); };

  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.green}55`,borderRadius:22,width:"min(560px,96vw)",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:`0 0 80px ${C.green}11`}}>
        <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <h2 style={{margin:0,fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.text}}>📥 IMPORT CSV</h2>
            <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Load or update KRs from your filled template</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"5px 11px",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{display:"flex",padding:"14px 24px 0",gap:8,flexShrink:0}}>
          {[["file","📁 Upload File"],["paste","📋 Paste Text"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");setRawText("");setFileName("");}}
              style={{padding:"7px 18px",borderRadius:"9px 9px 0 0",border:`1px solid ${mode===m?C.green:C.border}`,borderBottom:"none",background:mode===m?`${C.green}15`:C.surface,color:mode===m?C.green:C.muted,cursor:"pointer",fontWeight:700,fontSize:12}}>{l}</button>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 20px"}}>
          <div style={{border:`1px solid ${C.green}22`,borderRadius:"0 9px 9px 9px",padding:18,background:`${C.green}04`,marginBottom:14}}>
            {mode==="file" && !rawText && (
              <div>
                <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={onDrop}
                  style={{border:`2px dashed ${drag?C.green:C.border}`,borderRadius:10,padding:"26px 16px",textAlign:"center",background:drag?`${C.green}08`:"transparent",marginBottom:12}}>
                  <div style={{fontSize:34,marginBottom:8}}>📂</div>
                  <div style={{fontSize:13,color:C.text,fontWeight:600,marginBottom:4}}>Drag & drop your CSV here</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12}}>or pick a file below</div>
                  <input type="file" accept=".csv,.txt" onChange={e=>{readFile(e.target.files[0]); e.target.value="";}}
                    style={{display:"block",fontSize:12,color:C.text,cursor:"pointer",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",width:"100%",maxWidth:280,margin:"0 auto"}}/>
                </div>
                <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>Can't upload? Switch to <b style={{color:C.green}}>Paste Text</b> tab</div>
              </div>
            )}
            {mode==="file" && rawText && (
              <div>
                <div style={{background:`${C.green}12`,border:`1px solid ${C.green}33`,borderRadius:9,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:6}}>✓ {fileName} loaded</div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",lineHeight:1.6,maxHeight:80,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{rawText.slice(0,300)}{rawText.length>300?"…":""}</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>{setRawText("");setFileName("");}} style={{flex:1,padding:"10px 0",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontWeight:600,fontSize:12}}>← Change</button>
                  <button onClick={()=>tryParse(rawText)} style={{flex:2,padding:"10px 0",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.green},${C.accent})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>Preview & Import →</button>
                </div>
              </div>
            )}
            {mode==="paste" && (
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Open your CSV in a text editor → Select All → Copy → paste below:</div>
                <textarea value={pasted} onChange={e=>setPasted(e.target.value)}
                  placeholder={"Chief Group,Department,Key Result,Target Date,Target,Actual\nCSO,BusDev Department,Close 10 new accounts,Dec 31 2026,10,0"}
                  style={{width:"100%",height:160,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:11,fontFamily:"monospace",resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.6}}
                  onFocus={e=>e.target.style.borderColor=C.green} onBlur={e=>e.target.style.borderColor=C.border}/>
                <button onClick={()=>{if(!pasted.trim()){setErr("Paste CSV content first.");return;} tryParse(pasted);}}
                  style={{marginTop:10,width:"100%",padding:"11px 0",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.green},${C.accent})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>Preview & Import →</button>
              </div>
            )}
          </div>
          {err&&<div style={{background:`${C.red}12`,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 13px",fontSize:12,color:C.red,marginBottom:12,lineHeight:1.6,whiteSpace:"pre-wrap"}}>⚠ {err}</div>}
          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}22`,borderRadius:9,padding:"12px 14px",fontSize:11,color:C.muted,lineHeight:1.8}}>
            <b style={{color:C.accent}}>Required columns:</b>
            <div style={{fontFamily:"monospace",fontSize:10,color:C.text,background:C.surface,borderRadius:6,padding:"6px 10px",marginTop:5,wordBreak:"break-all"}}>Chief Group, Department, Key Result, Target Date, Target, Actual</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const PreviewModal = ({preview,existing,errors,onClose,onConfirm}) => {
  const ekeys = new Set(existing.map(mkey));
  const updates = preview.filter(r=>ekeys.has(mkey(r)));
  const adds = preview.filter(r=>!ekeys.has(mkey(r)));
  const [tab,setTab] = useState("all");
  const shown = tab==="all"?preview:tab==="update"?updates:adds;
  return (
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:20,width:"min(860px,96vw)",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:`0 0 60px ${C.accent}11`}}>
        <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <h2 style={{margin:"0 0 4px",fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.text}}>IMPORT PREVIEW</h2>
          <p style={{margin:"0 0 10px",fontSize:12,color:C.muted}}>{preview.length} rows detected — review before applying.</p>
          {errors.length>0&&<div style={{background:`${C.amber}12`,border:`1px solid ${C.amber}33`,borderRadius:7,padding:"6px 12px",fontSize:11,color:C.amber,marginBottom:8,lineHeight:1.6}}>{errors.slice(0,4).join("\n")}</div>}
          <div style={{display:"flex",gap:8}}>
            {[["all",`All (${preview.length})`,C.accent],["update",`Updates (${updates.length})`,C.amber],["add",`New (${adds.length})`,C.green]].map(([k,l,col])=>(
              <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${tab===k?col:C.border}`,background:tab===k?`${col}22`:"transparent",color:tab===k?col:C.muted,cursor:"pointer",fontWeight:700,fontSize:11}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"8px 70px 130px 1fr 90px 70px 70px 70px",gap:"0 8px",padding:"8px 24px",background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>
            <div/><div>Chief</div><div>Department</div><div>Key Result</div><div>Target Date</div><div>Target</div><div>Actual</div><div>Action</div>
          </div>
          {shown.length===0&&<div style={{padding:"20px 24px",color:C.muted,fontSize:13}}>No rows.</div>}
          {shown.map((r,i)=>{
            const isU=ekeys.has(mkey(r)), col=isU?C.amber:C.green, chiefCol=CHIEF_COLORS[r.chiefGroup]||C.muted;
            return (
              <div key={i} style={{display:"grid",gridTemplateColumns:"8px 70px 130px 1fr 90px 70px 70px 70px",gap:"0 8px",padding:"8px 24px",borderBottom:`1px solid ${C.border}`,alignItems:"center",background:i%2?"transparent":`${C.surface}44`,fontSize:11}}>
                <div style={{width:7,height:7,borderRadius:99,background:col,flexShrink:0}}/>
                <div style={{fontWeight:700,color:chiefCol,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.chiefGroup||"—"}</div>
                <div style={{fontWeight:600,color:col,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.department}</div>
                <div style={{color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.keyResult}>{r.keyResult}</div>
                <div style={{color:C.muted,fontSize:10,whiteSpace:"nowrap"}}>{r.targetDate||"—"}</div>
                <div style={{color:C.muted}}>{Number(r.target).toLocaleString()}</div>
                <div style={{color:C.text,fontWeight:600}}>{Number(r.actual).toLocaleString()}</div>
                <span style={{padding:"2px 7px",borderRadius:99,fontSize:10,fontWeight:700,background:`${col}18`,color:col,border:`1px solid ${col}44`}}>{isU?"↻ Update":"+ New"}</span>
              </div>
            );
          })}
        </div>
        <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,flexWrap:"wrap",gap:10}}>
          <span style={{fontSize:13,color:C.muted}}><b style={{color:C.amber}}>{updates.length} update{updates.length!==1?"s":""}</b> · <b style={{color:C.green}}>{adds.length} new</b></span>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{padding:"9px 18px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={onConfirm} style={{padding:"9px 20px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Apply Import ({preview.length})</button>
          </div>
        </div>
      </div>
    </div>
  );
};

    chiefGroup: row.chiefGroup||"", department: row.department, _deptMode: "list",

  });

          <button onClick={()=>onDelete(row.id)} style={{flex:1,padding:10,borderRadius:8,border:"none",background:C.red,color:"#fff",cursor:"pointer",fontWeight:700}}>Delete</button>

            </div>
            <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.4}}>{row.keyResult}</div>
          </div>

        </div>
        {!editing && (
          <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>

                </select>

function getInsights(rows) {
  const deptMap = {};
  rows.forEach(r => { const d=r.department; if(!deptMap[d]) deptMap[d]={chief:r.chiefGroup||getChief(r.department),krs:[],w:0,s:0}; deptMap[d].krs.push(r); deptMap[d].w+=r.weight; deptMap[d].s+=r.scoreEquivalent; });
  const totW=rows.reduce((s,r)=>s+r.weight,0), totS=rows.reduce((s,r)=>s+r.scoreEquivalent,0);
  const ovPct=totW>0?((totS/totW)*100).toFixed(1):"0.0";
  const summary=Object.entries(deptMap).map(([name,d])=>{
    const pct=d.w>0?((d.s/d.w)*100).toFixed(1):"0.0";
    return name+"("+d.chief+"):"+pct+"%,KRs:"+d.krs.map(k=>k.keyResult+"="+k.pct+"%").join(";");
  }).join("\n");
  const body = JSON.stringify({
    model:"claude-sonnet-4-20250514", max_tokens:1000,
    system:"You are an OKR strategist. Return ONLY valid JSON, no markdown.",
    messages:[{role:"user",content:"OKR data for Chiefs Group. Overall: "+ovPct+"%. Departments:\n"+summary+"\nReturn JSON: {\"insights\":[\"...\",\"...\",\"...\"],\"recommendations\":[\"...\",\"...\",\"...\"],\"risks\":[\"...\",\"...\",\"...\"],\"overallAssessment\":\"2 sentences\"}"}]
  });
  return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:body})
    .then(function(res){ return res.json(); })
    .then(function(d){
      if(d.error) throw new Error(d.error.message||"API error");
      return JSON.parse(d.content.map(function(b){return b.text||"";}).join("").trim());
    });
}

              {historyData.map((yd,i)=>{
                const col=sc(yd.pct), isCurrent=yd.year===CURRENT_YEAR;
                const prev=i>0?historyData[i-1].pct:null;
                const delta=prev!==null?yd.pct-prev:null;
                return (<div key={yd.year} onClick={()=>switchYear(yd.year)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"}}>
                  <div style={{fontSize:11,fontWeight:700,color:delta===null?C.muted:delta>=0?C.green:C.red,marginBottom:6,height:18}}>
                    {delta!==null&&(delta>=0?"▲ ":"▼ ")+Math.abs(delta).toFixed(1)+"%"}
                  </div>
                  <div style={{width:"100%",flex:1,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                    <div style={{width:"80%",height:`${Math.max(yd.pct,4)}%`,background:`linear-gradient(180deg,${col}55,${col})`,borderRadius:"8px 8px 0 0",border:`2px solid ${col}44`,position:"relative"}}>
                      <div style={{position:"absolute",top:-26,left:"50%",transform:"translateX(-50%)",fontSize:15,fontWeight:800,fontFamily:"'Bebas Neue'",color:col,whiteSpace:"nowrap"}}>{yd.pct.toFixed(1)}%</div>
                    </div>
                  </div>
                  <div style={{marginTop:8,textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,fontFamily:"'Bebas Neue'",color:isCurrent?C.gold:C.text}}>{yd.year}</div>
                    <div style={{fontSize:10,color:C.muted}}>{yd.krs} KRs</div>
                  </div>
                </div>);
              })}
            </div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",marginBottom:20}}>
            <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:800}}>Year-over-Year Summary</div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface}}>{["Fiscal Year","Score","Status","On Track","At Risk","Off Track","KRs","YoY Change",""].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
              <tbody>
                {[...historyData].reverse().map((yd,i,arr)=>{
                  const prev=arr[i+1], delta=prev?yd.pct-prev.pct:null, isCurrent=yd.year===CURRENT_YEAR;
                  return (<tr key={yd.year} onClick={()=>switchYear(yd.year)} style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:isCurrent?`${C.gold}08`:"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}0a`} onMouseLeave={e=>e.currentTarget.style.background=isCurrent?`${C.gold}08`:"transparent"}>
                    <td style={{padding:"12px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17,fontWeight:800,fontFamily:"'Bebas Neue'",color:isCurrent?C.gold:C.text}}>FY {yd.year}</span>{isCurrent&&<span style={{fontSize:9,padding:"1px 7px",borderRadius:99,background:`${C.gold}22`,color:C.gold,fontWeight:700,border:`1px solid ${C.gold}44`}}>CURRENT</span>}</div></td>
                    <td style={{padding:"12px 14px"}}><span style={{fontSize:22,fontWeight:800,fontFamily:"'Bebas Neue'",color:sc(yd.pct)}}>{yd.pct.toFixed(1)}%</span></td>
                    <td style={{padding:"12px 14px"}}><Badge score={yd.pct}/></td>
                    <td style={{padding:"12px 14px",fontWeight:700,color:C.green,fontSize:14}}>{yd.onTrack}</td>
                    <td style={{padding:"12px 14px",fontWeight:700,color:C.amber,fontSize:14}}>{yd.atRisk}</td>
                    <td style={{padding:"12px 14px",fontWeight:700,color:C.red,fontSize:14}}>{yd.offTrack}</td>
                    <td style={{padding:"12px 14px",fontSize:12,color:C.muted}}>{yd.krs}</td>
                    <td style={{padding:"12px 14px"}}>{delta!==null?<span style={{fontWeight:700,color:delta>=0?C.green:C.red,fontSize:13}}>{delta>=0?"▲":"▼"} {Math.abs(delta).toFixed(1)}%</span>:<span style={{color:C.muted,fontSize:12}}>Base Year</span>}</td>
                    <td style={{padding:"12px 14px",fontSize:11,color:C.accent,fontWeight:600}}>Open →</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
            <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:800}}>Department Performance History</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
                <thead><tr style={{background:C.surface}}>
                  <th style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,minWidth:180}}>Department</th>
                  <th style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`}}>Chief</th>
                  {years.map(y=><th key={y} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:y===CURRENT_YEAR?C.gold:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>FY {y}{y===CURRENT_YEAR?" ★":""}</th>)}
                  <th style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`}}>Trend</th>
                </tr></thead>
                <tbody>
                  {(()=>{
                    const allDeptNames=[...new Set(years.flatMap(y=>((yearStore[y]||{}).rows||[]).map(r=>r.department)))].sort();
                    return allDeptNames.map((dname,idx)=>{
                      const yearPcts=years.map(y=>{const yr=((yearStore[y]||{}).rows||[]).filter(r=>r.department===dname);if(!yr.length)return null;const w=yr.reduce((s,r)=>s+r.weight,0),s2=yr.reduce((s,r)=>s+r.scoreEquivalent,0);return w>0?(s2/w)*100:0;});
                      const chief=years.map(y=>{ const r2=((yearStore[y]||{}).rows||[]).find(r=>r.department===dname); return r2 ? r2.chiefGroup : null; }).find(Boolean)||"—";
                      const validP=yearPcts.filter(p=>p!==null);
                      const trend=validP.length>=2?validP[validP.length-1]-validP[validP.length-2]:null;
                      const dc=PALETTE[idx%PALETTE.length], cc=CHIEF_COLORS[chief]||C.muted;
                      return (<tr key={dname} style={{borderBottom:`1px solid ${C.border}22`,background:"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=`${dc}0a`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <td style={{padding:"9px 14px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:7,height:7,borderRadius:99,background:dc,flexShrink:0}}/><span style={{fontSize:12,fontWeight:700,color:dc}}>{dname}</span></div></td>
                        <td style={{padding:"9px 14px"}}><span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontWeight:700}}>{chief}</span></td>
                        {years.map((y,yi)=>{const p=yearPcts[yi];if(p===null)return <td key={y} style={{padding:"9px 14px",color:C.muted,fontSize:12}}>—</td>;return <td key={y} style={{padding:"9px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:800,color:sc(p),fontFamily:"'Bebas Neue'"}}>{p.toFixed(1)}%</span><div style={{width:44,height:5,background:C.border,borderRadius:99,overflow:"hidden"}}><div style={{width:`${Math.min(p,100)}%`,height:"100%",background:sc(p),borderRadius:99}}/></div></div></td>;})}
                        <td style={{padding:"9px 14px"}}>{trend!==null?<span style={{fontSize:12,fontWeight:700,color:trend>=0?C.green:C.red}}>{trend>=0?"▲":"▼"} {Math.abs(trend).toFixed(1)}%</span>:<span style={{color:C.muted,fontSize:11}}>—</span>}</td>
                      </tr>);
                    });
                  })()}
                </tbody>
              </table>
            </div>
          </div>
          </div>
      )}

        </div>
      </div>

            {showIssueForm&&<IssueFormModal issue={editIssue} deptList={ALL_DEPTS_LIST} onClose={()=>{setShowIssueForm(false);setEditIssue(null);}} onSave={saveIssue}/>}
      {showImport&&<ImportModal onParsed={handleParsed} onClose={()=>setShowImport(false)}/>}
      {previewData&&<PreviewModal preview={previewData.rows} existing={rows} errors={previewData.errors} onClose={()=>setPreviewData(null)} onConfirm={handleImportConfirm}/>}
      {showAdd&&<AddKRModal onClose={()=>setShowAdd(false)} onSave={handleAdd}/>}
      {detailRow&&<KRDetailModal row={detailRow} onClose={()=>setDetailRow(null)} onSave={handleUpdate} onDelete={handleDelete} readOnly={isReadOnly}/>}
      {showTemplate&&<TemplateModal onClose={()=>setShowTemplate(false)}/>}
      {showUserMgmt&&<UserMgmtModal users={users} onClose={()=>setShowUserMgmt(false)} onSave={list=>{onUsersChange(list);setShowUserMgmt(false);toast$("Users updated.");}}/>}
    </>
  );
}


const { useState, useEffect, useMemo, useCallback, useRef } = React;
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AuthGate));

  </script>
</body>
</html>
