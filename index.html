                      <div style={{background:C.card,border:`1px solid ${C.accent}33`,borderTop:`2px solid ${C.accent}`,borderRadius:"0 0 12px 12px",overflow:"hidden",animation:"fadeUp .2s ease"}}>
                        <div style={{padding:"10px 16px",background:`${C.accent}0a`,display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.border}`}}>
                          <span style={{fontSize:11,fontWeight:800,color:C.accent,textTransform:"uppercase",letterSpacing:1.5}}>{qFilter.quarter} — {qFilter.status}</span>
                          <span style={{fontSize:11,color:C.muted}}>{filteredDepts.length} department{filteredDepts.length!==1?"s":""}</span>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:0}}>
                          {filteredDepts.map(([dept,data],i)=>{
                            const cc=CHIEF_COLORS[data.chief]||C.muted;
                            const subVal=data[qFilter.quarter]||"";
                            const revVal=data[`${qFilter.quarter}r`]||"";
                            const note=data[`${qFilter.quarter}note`]||"";
                            const dl=new Date()>new Date(schedule.submission[qFilter.quarter]||"9999");
                            const delayed=dl&&subVal!=="Updated";
                            return (
                              <div key={dept} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,borderRight:i%2===0?`1px solid ${C.border}`:"none"}}>
                                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>
                                  <div>
                                    <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{dept}</div>
                                    <span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontWeight:700}}>{data.chief}</span>
                                  </div>
                                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                                    {subVal&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:ssBg(subVal),color:ssColor(subVal),border:`1px solid ${ssColor(subVal)}44`,fontWeight:700,whiteSpace:"nowrap"}}>{subVal}</span>}
                                    {revVal&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:ssBg(revVal),color:ssColor(revVal),border:`1px solid ${ssColor(revVal)}44`,fontWeight:700,whiteSpace:"nowrap"}}>{revVal}</span>}
                                    {delayed&&<span style={{fontSize:9,color:C.red,fontWeight:700}}>⚠ Delayed</span>}
                                  </div>
                                </div>
                                {note&&<div style={{fontSize:10,color:C.muted,fontStyle:"italic",marginTop:4,padding:"4px 8px",background:C.surface,borderRadius:6,border:`1px solid ${C.border}`}}>📝 {note}</div>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    {qFilter&&filteredDepts.length===0&&(
                      <div style={{background:C.card,border:`1px solid ${C.accent}33`,borderTop:`2px solid ${C.accent}`,borderRadius:"0 0 10px 10px",padding:"16px",textAlign:"center",color:C.muted,fontSize:13}}>
                        No departments with "{qFilter.status}" status in {qFilter.quarter}.
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Per-Chief dept tables */}
              {["President","CSO","COO","CFO","CITO","EMSI"].map(chief=>{
                const deptRows = qDeptsByChief[chief] || [];
                if(!deptRows.length) return null;
                const cc=CHIEF_COLORS[chief]||C.muted;
                const revDates=schedule.review[chief]||{};
                return (
                  <div key={chief} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
                    {/* Chief header */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 16px",background:`${cc}12`,borderBottom:`1px solid ${cc}22`}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:30,height:30,borderRadius:8,background:`${cc}22`,border:`1px solid ${cc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:cc}}>{chief}</div>
                        <div>
                          <div style={{fontSize:13,fontWeight:800,color:C.text}}>{chief} Office</div>
                          <div style={{fontSize:11,color:C.muted}}>{deptRows.length} dept{deptRows.length!==1?"s":""}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:10}}>
                        {["Q1","Q2","Q3","Q4"].map(q=>{
                          const upd=deptRows.filter(d=>d[q]==="Updated").length, tot=deptRows.length;
                          return <div key={q} style={{textAlign:"center"}}><div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>{q}</div><div style={{fontSize:13,fontWeight:800,color:upd===tot?C.green:upd>0?C.amber:C.muted}}>{upd}/{tot}</div></div>;
                        })}
                      </div>
                    </div>

                    {/* Column headers */}
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
                        <thead>
                          <tr style={{background:C.surface}}>
                            <th style={{padding:"7px 12px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,width:"22%"}}>Department</th>
                            {["Q1","Q2","Q3","Q4"].map(q=>(
                              <th key={q} style={{padding:"7px 8px",textAlign:"center",fontSize:10,color:C.muted,fontWeight:700,borderBottom:`1px solid ${C.border}`,minWidth:160}} colSpan={3}>
                                <div style={{fontSize:11,color:C.accent,fontWeight:800,textTransform:"uppercase",letterSpacing:2}}>{q}</div>
                                {revDates[q]&&<div style={{fontSize:9,color:`${cc}bb`,marginTop:1}}>Review: {revDates[q]}</div>}
                              </th>
                            ))}
                          </tr>
                          <tr style={{background:C.surface,borderBottom:`1px solid ${C.border}`}}>
                            <th style={{padding:"4px 12px",fontSize:9,color:C.muted,fontWeight:600}}></th>
                            {["Q1","Q2","Q3","Q4"].map(q=>[
                              <th key={q+"s"} style={{padding:"4px 6px",textAlign:"center",fontSize:9,color:C.muted,fontWeight:600,borderLeft:`1px solid ${C.border}33`}}>Submission</th>,
                              <th key={q+"r"} style={{padding:"4px 6px",textAlign:"center",fontSize:9,color:C.muted,fontWeight:600}}>Review</th>,
                              <th key={q+"n"} style={{padding:"4px 6px",textAlign:"center",fontSize:9,color:C.muted,fontWeight:600,borderRight:`1px solid ${C.border}33`}}>Note</th>,
                            ])}
                          </tr>
                        </thead>
                        <tbody>
                          {deptRows.map((row,i)=>{
                            const deadline=new Date(schedule.submission.Q1||"9999");
                            return (
                              <tr key={row.dept} style={{borderBottom:i<deptRows.length-1?`1px solid ${C.border}`:"none",background:i%2===0?"transparent":`${C.surface}44`}}>
                                <td style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:C.text,verticalAlign:"middle"}}>{row.dept}</td>
                                {["Q1","Q2","Q3","Q4"].map(q=>{
                                  const subVal=row[q]||"", revVal=row[`${q}r`]||"", noteVal=row[`${q}note`]||"";
                                  const dl=new Date()>new Date(schedule.submission[q]||"9999");
                                  const isDelayed=dl&&subVal!=="Updated";
                                  const isEditSub=qEditCell?.dept===row.dept&&qEditCell?.quarter===q&&qEditCell?.field==="sub";
                                  const isEditRev=qEditCell?.dept===row.dept&&qEditCell?.quarter===q&&qEditCell?.field==="rev";
                                  const isEditNote=qEditCell?.dept===row.dept&&qEditCell?.quarter===q&&qEditCell?.field==="note";
                                  return [
                                    // Submission status
                                    <td key={q+"s"} style={{padding:"5px 5px",textAlign:"center",verticalAlign:"middle",borderLeft:`1px solid ${C.border}22`}}>
                                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                                        {isEditSub?(
                                          <select autoFocus value={subVal} onChange={e=>{ if(!isReadOnly) updateQStatus(row.dept,q,e.target.value); }} onBlur={()=>setQEditCell(null)}
                                            style={{background:C.surface,border:`1px solid ${C.accent}`,borderRadius:6,color:C.text,fontSize:10,padding:"3px 5px",outline:"none",width:110}}>
                                            {STATUS_OPTIONS.map(o=><option key={o} value={o}>{o||"— pending —"}</option>)}
                                          </select>
                                        ):(
                                          <div onClick={()=>{ if(!isReadOnly) setQEditCell({dept:row.dept,quarter:q,field:"sub"}); }}
                                            style={{display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"3px 8px",borderRadius:99,background:subVal?ssBg(subVal):`${C.border}18`,color:subVal?ssColor(subVal):C.muted,fontSize:10,fontWeight:700,border:`1px solid ${subVal?ssColor(subVal)+"44":C.border}`,cursor:"pointer",whiteSpace:"nowrap",minWidth:90,transition:"opacity .15s"}}
                                            onMouseEnter={e=>e.currentTarget.style.opacity=".7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                                            {subVal||"—"}
                                          </div>
                                        )}
                                        {isDelayed&&<div style={{fontSize:9,color:C.red,fontWeight:700}}>⚠ Delayed</div>}
                                      </div>
                                    </td>,
                                    // Review workflow
                                    <td key={q+"r"} style={{padding:"5px 5px",textAlign:"center",verticalAlign:"middle"}}>
                                      {isEditRev?(
                                        <select autoFocus value={revVal} onChange={e=>updateQReview(row.dept,q,e.target.value)} onBlur={()=>setQEditCell(null)}
                                          style={{background:C.surface,border:`1px solid ${C.accent}`,borderRadius:6,color:C.text,fontSize:10,padding:"3px 5px",outline:"none",width:110}}>
                                          {REVIEW_WORKFLOW.map(o=><option key={o} value={o}>{o||"— pending —"}</option>)}
                                        </select>
                                      ):(
                                        <div onClick={()=>{ if(!isReadOnly) setQEditCell({dept:row.dept,quarter:q,field:"rev"}); }}
                                          style={{display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"3px 8px",borderRadius:99,background:revVal?ssBg(revVal):`${C.border}18`,color:revVal?ssColor(revVal):C.muted,fontSize:10,fontWeight:700,border:`1px solid ${revVal?ssColor(revVal)+"44":C.border}`,cursor:"pointer",whiteSpace:"nowrap",minWidth:90}}
                                          onMouseEnter={e=>e.currentTarget.style.opacity=".7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                                          {revVal||"—"}
                                        </div>
                                      )}
                                    </td>,
                                    // Notes
                                    <td key={q+"n"} style={{padding:"5px 5px",textAlign:"center",verticalAlign:"middle",borderRight:`1px solid ${C.border}22`}}>
                                      {isEditNote?(
                                        <input autoFocus defaultValue={noteVal}
                                          onBlur={e=>{ updateQNote(row.dept,q,e.target.value); setQEditCell(null); }}
                                          onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Escape") e.target.blur(); }}
                                          style={{width:110,background:C.surface,border:`1px solid ${C.gold}`,borderRadius:6,color:C.text,fontSize:10,padding:"3px 6px",outline:"none"}}/>
                                      ):(
                                        <div onClick={()=>{ if(!isReadOnly) setQEditCell({dept:row.dept,quarter:q,field:"note"}); }}
                                          title={noteVal||"Click to add note"}
                                          style={{fontSize:10,color:noteVal?C.text:C.muted,cursor:"pointer",padding:"3px 6px",borderRadius:5,border:"1px solid transparent",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block"}}
                                          onMouseEnter={e=>e.currentTarget.style.borderColor=C.gold} onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                          {noteVal||"✎"}
                                        </div>
                                      )}
                                    </td>,
                                  ];
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}

              {/* Legend */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 16px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5}}>Legend</div>
                {[["✓ Updated",C.green],["↻ Ongoing",C.amber],["✕ No Update",C.red],["Submitted",C.accent],["Under Review",C.amber],["Done Review",C.green],["⚠ Delayed",C.red],["— Pending",C.muted]].map(([l,col])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:7,height:7,borderRadius:99,background:col}}/>
                    <span style={{fontSize:10,color:C.muted}}>{l}</span>
                  </div>
                ))}
                <span style={{marginLeft:"auto",fontSize:10,color:C.muted,fontStyle:"italic"}}>Click any cell to edit · Click dates to update</span>
              </div>
            </div>
          )}

          {/* ═══════════════ ISSUES TRACKER ═══════════════ */}
          {view==="issues"&&(
            <div>
              <div style={{marginBottom:14}}>
                <h1 style={{fontSize:"clamp(18px,5vw,22px)",fontWeight:800}}>Issues & Dependencies Tracker</h1>
                <p style={{fontSize:12,color:C.muted,marginTop:3}}>Log issues, dependencies, assignments and track resolution · {issues.length} issue{issues.length!==1?"s":""} logged</p>
              </div>

              {/* Summary cards */}
              {issues.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
                  {ISSUE_STATUS_LIST.map(s=>{
                    const n=issues.filter(i=>i.status===s).length, col=isColor(s);
                    return (
                      <div key={s} style={{background:C.card,border:`1px solid ${col}33`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>{s}</div>
                        <div style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",color:col}}>{n}</div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Toolbar */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                {!isReadOnly && <button onClick={()=>{setEditIssue(null);setShowIssueForm(true);}} style={{padding:"9px 16px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,display:"inline-flex",alignItems:"center",gap:5,boxShadow:`0 2px 10px ${C.accent}44`}}>⚑ Log New Issue</button>}
                <span style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>
                  Open <b style={{color:C.red}}>{issues.filter(i=>i.status==="Open").length}</b> · In Progress <b style={{color:C.amber}}>{issues.filter(i=>i.status==="In Progress").length}</b> · Resolved <b style={{color:C.green}}>{issues.filter(i=>i.status==="Resolved"||i.status==="Closed").length}</b>
                </span>
              </div>

              {issues.length===0?(
                <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:12,padding:"40px 24px",textAlign:"center"}}>
                  <div style={{fontSize:38,marginBottom:10}}>📝</div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>No issues logged yet</div>
                  <div style={{fontSize:12,color:C.muted}}>Click <b style={{color:C.accent}}>⚑ Log New Issue</b> to start tracking issues and dependencies</div>
                </div>
              ):(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:1000}}>
                    <thead>
                      <tr style={{background:C.surface}}>
                        {["#","Type","Issue / Description","Raised By","Assigned To (Resolve)","Status","Target Closure","Remarks",""].map(h=>(
                          <th key={h} style={{padding:"9px 10px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {issues.map((issue,idx)=>{
                        const ic=isColor(issue.status);
                        return (
                          <tr key={issue.id} style={{borderBottom:idx<issues.length-1?`1px solid ${C.border}`:"none",background:idx%2===0?"transparent":`${C.surface}44`,transition:"background .12s",cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}08`}
                            onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":`${C.surface}44`}>
                            <td style={{padding:"9px 10px",fontSize:11,color:C.muted,fontWeight:700,whiteSpace:"nowrap"}}>#{String(idx+1).padStart(3,"0")}</td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}>
                              <span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:`${C.purple}18`,color:C.purple,border:`1px solid ${C.purple}33`,fontWeight:700}}>{issue.type||"—"}</span>
                            </td>
                            <td style={{padding:"9px 10px",maxWidth:240}}>
                              <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={issue.description}>{issue.description}</div>
                              <div style={{fontSize:10,color:C.muted,marginTop:2}}>Raised: {issue.createdAt||"—"}</div>
                            </td>
                            <td style={{padding:"9px 8px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{issue.raisedBy||"—"}</td>
                            <td style={{padding:"9px 8px",maxWidth:200}}>
                              <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                                {(issue.assignedTo||[]).map(d=>(
                                  <span key={d} style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:`${C.accent}18`,color:C.accent,border:`1px solid ${C.accent}33`,fontWeight:600,whiteSpace:"nowrap"}}>{d}</span>
                                ))}
                                {(!issue.assignedTo||issue.assignedTo.length===0)&&<span style={{fontSize:11,color:C.muted}}>—</span>}
                              </div>
                            </td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}>
                              <span style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:99,fontSize:10,fontWeight:700,background:isBg(issue.status),color:ic,border:`1px solid ${ic}44`}}>{issue.status||"Open"}</span>
                            </td>
                            <td style={{padding:"9px 8px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{issue.targetClosure||"—"}</td>
                            <td style={{padding:"9px 10px",maxWidth:180}}>
                              <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={issue.remarks}>{issue.remarks||"—"}</div>
                            </td>
                            <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}>
                              {!isReadOnly && <div style={{display:"flex",gap:4}}>
                                <button onClick={()=>{setEditIssue(issue);setShowIssueForm(true);}} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11,padding:"3px 7px",borderRadius:6}}>✎</button>
                                <button onClick={()=>deleteIssue(issue.id)} style={{background:"none",border:`1px solid ${C.red}33`,color:C.red,cursor:"pointer",fontSize:11,padding:"3px 7px",borderRadius:6}}>✕</button>
                              </div>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

        </div>
      </div>

      {/* Issue Form Modal */}
      {showIssueForm&&(
        <IssueFormModal
          issue={editIssue}
          deptList={ALL_DEPTS_LIST}
          onClose={()=>{setShowIssueForm(false);setEditIssue(null);}}
          onSave={saveIssue}
        />
      )}
      {showImport    && <ImportModal   onParsed={handleParsed} onClose={()=>setShowImport(false)}/>}
      {previewData   && <PreviewModal  preview={previewData.rows} existing={rows} errors={previewData.errors} onClose={()=>setPreviewData(null)} onConfirm={handleImportConfirm}/>}
      {showAdd       && <AddKRModal    onClose={()=>setShowAdd(false)} onSave={handleAdd}/>}
      {detailRow     && <KRDetailModal row={detailRow} onClose={()=>setDetailRow(null)} onSave={handleUpdate} onDelete={handleDelete}/>}
    </>
  );
}

// Mount
const domRoot = document.getElementById('root');
const root = ReactDOM.createRoot(domRoot);
root.render(<AuthGate/>);

  </script>
</body>
</html>
